<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
       height: 100vh;
       display: flex;
       align-items: center;
       justify-content: center;
       background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
    }
  </style>
</head>
<body>
  <div class="auth-container animate-fade-in" style="width: 100%; max-width: 400px; padding: 3rem; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <h1 style="color: var(--primary); font-size: 2.5rem; margin-bottom: 0.5rem;">Movie Magic</h1>
      <p style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 800;">Command Center</p>
    </div>

    <form id="admin-login-form">
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" id="email" value="admin@moviemagic.com" required placeholder="Enter admin email">
      </div>
      <div class="form-group">
        <label>Secure Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      
      <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1.5rem; height: 50px; font-size: 1rem; letter-spacing: 1px;">
        Authorize Access
      </button>
    </form>
    
    <div style="margin-top: 2rem; text-align: center;">
      <a href="/" style="color: #666; text-decoration: none; font-size: 0.8rem;">Return to Customer Portal</a>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    document.getElementById('admin-login-form').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await API.fetch('/api/admin?action=login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        if (res.success) {
          localStorage.setItem('adminUser', JSON.stringify(res.admin));
          UI.showMessage('Authorization Successful. Redirecting...', 'success');
          setTimeout(() => { window.location.href = '/admin-dashboard.html'; }, 1000);
        } else {
          UI.showMessage(res.error || 'Access Denied');
        }
      } catch (err) {
        UI.showMessage(err.message);
      }
    };
  </script>
</body>
</html>
