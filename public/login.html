<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1920&q=80'); background-size: cover;">
  <nav>
    <a href="/" class="logo">MOVIE MAGIC</a>
    <div class="links">
      <a href="/">Home</a>
      <a href="/signup.html">Signup</a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-container">
      <h2 style="font-size: 2rem; margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
      <form id="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
      </form>
      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        New to Movie Magic? <a href="/signup.html" style="color: var(--primary); text-decoration: none;">Join now</a>
      </p>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const { user } = await API.fetch('/api/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        API.saveSession(user);
        UI.showMessage('Login successful!', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } catch (err) {
        UI.showMessage(err.message);
      }
    };
  </script>
</body>
</html>
