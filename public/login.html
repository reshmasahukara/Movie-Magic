<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1920&q=80'); background-size: cover;">
  <nav>
    <a href="/" class="logo"><i>🎬</i> MOVIE MAGIC</a>
    <div class="links">
      <a href="/">Home</a>
      <a href="/signup.html">Signup</a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-container">
      <h2 style="font-size: 2rem; margin-bottom: 2rem; text-align: center;">Secure Login | Movie Magic</h2>
      <form id="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com">
        </div>
        <div class="form-group" style="margin-bottom: 0.5rem;">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <div class="forgot-force">
           <a href="#" id="forgotPasswordBtn">Forgot Password?</a>
        </div>
        <div class="auth-divider">OR</div>
        <button type="button" id="google-signin-btn" class="btn-google">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Continue with Google
        </button>
      </form>
      <p style="text-align: center; margin-top: 2rem; color: #888; font-size: 0.9rem;">
        New to Movie Magic? <a href="/signup.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">Join now</a>
      </p>
    </div>
  </div>

  <!-- Forgot Password Multi-Step Modal -->
  <div class="modal-overlay" id="forgotModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10000; align-items:center; justify-content:center;">
    <div class="modal-content" style="max-width: 400px; padding: 2.5rem; background:#111; border:1px solid #333; border-radius:15px; text-align:center;">
      
      <!-- Step 1: Email -->
      <div id="forgot-step-1">
        <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem; color: white;">Find Your Account</h2>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 2rem;">Enter your registered email to receive an OTP.</p>
        <div class="form-group" style="text-align: left;">
          <input type="email" id="forgot-email" placeholder="email@example.com" style="width:100%; background:#000; color:white; border:1px solid #333; padding:12px; border-radius:8px;">
        </div>
        <button id="forgot-send-btn" class="btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 12px;">SEND OTP</button>
        <button onclick="closeForgotModal()" style="background:none; border:none; color:#666; margin-top:1rem; cursor:pointer;">Cancel</button>
      </div>

      <!-- Step 2: OTP -->
      <div id="forgot-step-2" style="display:none;">
        <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem; color: white;">Verify OTP</h2>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 2rem;">Check your email for the 6-digit code.</p>
        <div class="form-group">
          <input type="text" id="forgot-otp" placeholder="000000" maxlength="6" style="text-align: center; font-size:1.5rem; letter-spacing:8px; width:100%; background:#000; color:white; border:1px solid #333; padding:12px; border-radius:8px;">
        </div>
        <button id="forgot-verify-btn" class="btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 12px;">VERIFY & PROCEED</button>
      </div>

      <!-- Step 3: New Password -->
      <div id="forgot-step-3" style="display:none;">
        <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem; color: white;">Reset Password</h2>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 2rem;">Choose a new, strong password.</p>
        <div class="form-group" style="text-align: left; margin-bottom: 1rem;">
          <label style="font-size: 0.8rem; color:#666;">New Password</label>
          <input type="password" id="forgot-new-pass" style="width:100%; background:#000; color:white; border:1px solid #333; padding:12px; border-radius:8px;">
        </div>
        <div class="form-group" style="text-align: left;">
          <label style="font-size: 0.8rem; color:#666;">Confirm Password</label>
          <input type="password" id="forgot-confirm-pass" style="width:100%; background:#000; color:white; border:1px solid #333; padding:12px; border-radius:8px;">
        </div>
        <button id="forgot-reset-btn" class="btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 12px;">UPDATE PASSWORD</button>
      </div>

    </div>
  </div>

  <script src="js/utils.js"></script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
