<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Checkout | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="height: 100vh; display: flex; flex-direction: column;">
  <nav></nav>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="auth-container" style="margin: 0; width: 100%; max-width: 500px; padding: 2.5rem; position: relative; z-index: 1;">
      <h2 style="margin-bottom: 2rem; color: var(--primary); text-align: center;">Secure Checkout</h2>
      
      <div id="booking-details" style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid var(--glass);">
        <p style="color: var(--text-muted); text-align: center;">Loading transaction data...</p>
      </div>

      <form id="payment-form">
        <div class="form-group">
          <label>Cardholder Name</label>
          <input type="text" id="card-name" placeholder="Enter cardholder name" required>
        </div>
        <div class="form-group">
          <label>Card Number</label>
          <input type="text" id="card-num" placeholder="0000 0000 0000 0000" maxlength="19" required>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label>Expiry (MM/YY)</label>
            <input type="text" placeholder="12/28" maxlength="5" required>
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="password" placeholder="•••" maxlength="3" required>
          </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1.5rem; height: 55px; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 10px;" id="pay-btn">
          <span>Authorize Payment</span>
        </button>
      </form>

      <div style="margin-top: 1rem; text-align: center;">
        <p style="font-size: 0.7rem; color: #555;">Booking ID: <span id="display-id">#00000</span></p>
      </div>

      <div style="margin-top: 2rem; display: flex; align-items: center; justify-content: center; gap: 1rem; opacity: 0.5;">
        <img src="https://img.icons8.com/color/48/000000/visa.png" width="30">
        <img src="https://img.icons8.com/color/48/000000/mastercard.png" width="30">
        <p style="font-size: 0.75rem; color: var(--text-muted);">Secure Gateway</p>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    let paymentData = null;

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const type = urlParams.get('type');
      const eventId = urlParams.get('id');
      const qty = parseInt(urlParams.get('qty')) || 1;

      // 1. Resolve Data (Event vs Movie)
      if (type === 'event' && eventId) {
        try {
          const res = await API.fetch(`/api/events?action=details&id=${eventId}`);
          if (!res.success) throw new Error('Event not found');
          
          paymentData = {
            type: 'event',
            booking_id: `EV-${Date.now()}`,
            movie_name: res.event.event_name,
            amount: res.event.price * qty,
            qty: qty,
            event_id: eventId,
            event_details: res.event
          };
        } catch (e) {
          UI.showMessage('Error loading event details');
          return;
        }
      } else {
        const stored = localStorage.getItem('paymentData');
        if (!stored) {
          UI.showMessage('Transaction data missing. Redirecting...');
          setTimeout(() => window.location.href = '/', 1500);
          return;
        }
        paymentData = JSON.parse(stored);
        paymentData.type = 'movie';
      }

      // 2. Populate UI
      document.getElementById('display-id').textContent = `#${paymentData.booking_id}`;

      let dateString = "Date Pending";
      let timeString = "00:00";

      if (paymentData.type === 'event') {
        const d = new Date(paymentData.event_details.event_date);
        dateString = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        timeString = paymentData.event_details.event_time || "TBA";
      } else {
        const datetimeParam = urlParams.get('datetime');
        if (datetimeParam) {
          const dateObj = new Date(datetimeParam);
          if (!isNaN(dateObj.getTime())) {
            dateString = dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
            timeString = dateObj.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
          }
        }
      }

      document.getElementById('booking-details').innerHTML = `
        <div style="text-align: center;">
          <h4 style="color: white; font-size: 1.2rem; margin-bottom: 0.5rem;">${paymentData.movie_name}</h4>
          <p style="font-size: 0.9rem; color: var(--text-muted);">${timeString} • ${dateString}</p>
          <div style="margin: 1rem 0; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between;">
            <span style="color: var(--text-muted)">${paymentData.type === 'event' ? 'Quantity' : 'Seats'}</span>
            <span style="color: white; font-weight: bold;">${paymentData.type === 'event' ? paymentData.qty : paymentData.seats.join(', ')}</span>
          </div>
          <div style="display: flex; justify-content: space-between; font-size: 1.25rem;">
            <span style="color: white;">Amount Due</span>
            <span style="color: var(--primary); font-weight: 800;">₹${paymentData.amount}</span>
          </div>
        </div>
      `;
      document.getElementById('pay-btn').querySelector('span').textContent = `Pay ₹${paymentData.amount}`;
    }

    document.getElementById('payment-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('pay-btn');
      btn.disabled = true;
      btn.querySelector('span').textContent = "Processing...";

      try {
        if (paymentData.type === 'event') {
          const user = API.getUser();
          const res = await API.fetch('/api/events?action=book', {
            method: 'POST',
            body: JSON.stringify({
              event_id: paymentData.event_id,
              user_id: user.user_id,
              user_name: user.name,
              email: user.email,
              phone: user.contact_no || 'Not Set',
              tickets_count: paymentData.qty,
              amount: paymentData.amount
            })
          });

          if (!res.success) throw new Error(res.error || 'Payment failed');
          
          UI.showMessage('Event Booking Successful!', 'success');
          setTimeout(() => window.location.href = '/event-success.html', 1500);
          return;
        }

        // Movie Payment Flow
        const payRes = await API.fetch('/api/payment', {
          method: 'POST',
          body: JSON.stringify({
            booking_id: paymentData.booking_id,
            amount: paymentData.amount,
            payment_method: 'Credit/Debit Card',
            card_name: document.getElementById('card-name').value
          })
        });

        UI.showMessage('Payment Successful!', 'success');
        localStorage.setItem('last_booking_id', paymentData.booking_id);
        setTimeout(() => { window.location.href = '/success.html'; }, 1000);

      } catch (err) {
        UI.showMessage(err.message);
        btn.disabled = false;
        btn.querySelector('span').textContent = `Pay ₹${paymentData.amount}`;
      }
    };

    init();
  </script>
</body>
</html>
