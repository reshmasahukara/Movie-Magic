<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Checkout | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="height: 100vh; display: flex; flex-direction: column;">
  <nav></nav>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="auth-container" style="margin: 0; width: 100%; max-width: 500px; padding: 2.5rem; position: relative; z-index: 1;">
      <h2 style="margin-bottom: 2rem; color: var(--primary); text-align: center;">Secure Checkout</h2>
      
      <div id="booking-details" style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid var(--glass);">
        <p style="color: var(--text-muted); text-align: center;">Loading ticket details...</p>
      </div>

      <form id="payment-form">
        <div class="form-group">
          <label>Cardholder Name</label>
          <input type="text" id="card-name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Card Number</label>
          <input type="text" id="card-num" placeholder="4567 •••• •••• 1234" maxlength="19" required>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label>Expiry (MM/YY)</label>
            <input type="text" placeholder="12/28" maxlength="5" required>
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="password" placeholder="•••" maxlength="3" required>
          </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1.5rem; height: 55px; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 10px;" id="pay-btn">
          <span>Pay Now</span>
        </button>
      </form>

      <div style="margin-top: 2rem; display: flex; align-items: center; justify-content: center; gap: 1rem; opacity: 0.5;">
        <img src="https://img.icons8.com/color/48/000000/visa.png" width="30">
        <img src="https://img.icons8.com/color/48/000000/mastercard.png" width="30">
        <p style="font-size: 0.75rem; color: var(--text-muted);">Secure SSL Encryption</p>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    let pendingData = null;

    async function init() {
      const stored = localStorage.getItem('pending_booking');
      if (!stored) {
        UI.showMessage('No pending booking found. Redirecting...');
        setTimeout(() => window.location.href = '/', 1500);
        return;
      }

      pendingData = JSON.parse(stored);

      document.getElementById('booking-details').innerHTML = `
        <div style="text-align: center;">
          <h4 style="color: white; font-size: 1.2rem; margin-bottom: 0.5rem;">${pendingData.movie_name}</h4>
          <p style="font-size: 0.9rem; color: var(--text-muted);">${pendingData.timmings} | ${new Date(pendingData.show_date).toLocaleDateString()}</p>
          <div style="margin: 1rem 0; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between;">
            <span style="color: var(--text-muted)">Seats (${pendingData.noofseats})</span>
            <span style="color: white; font-weight: bold;">${pendingData.seats.join(', ')}</span>
          </div>
          <div style="display: flex; justify-content: space-between; font-size: 1.25rem;">
            <span style="color: white;">Amount</span>
            <span style="color: var(--primary); font-weight: 800;">₹${pendingData.price}</span>
          </div>
        </div>
      `;
      document.getElementById('pay-btn').querySelector('span').textContent = `Pay ₹${pendingData.price}`;
    }

    document.getElementById('payment-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('pay-btn');
      btn.disabled = true;
      btn.querySelector('span').textContent = "Authorizing...";

      try {
        // Step 1: Simulated Payment API Call
        await API.fetch('/api/payment', {
          method: 'POST',
          body: JSON.stringify({
            amount: pendingData.price,
            card_name: document.getElementById('card-name').value
          })
        });

        // Step 2: Final Booking API Call
        const bookRes = await API.fetch('/api/booking', {
          method: 'POST',
          body: JSON.stringify({
            ...pendingData,
            payment_status: 'Paid'
          })
        });

        UI.showMessage('Payment Successful!', 'success');
        
        // Save final booking ID for success page before clearing session
        localStorage.setItem('last_booking_id', bookRes.bookingId);
        
        setTimeout(() => {
          localStorage.removeItem('pending_booking');
          window.location.href = '/success.html';
        }, 1000);

      } catch (err) {
        UI.showMessage(err.message);
        btn.disabled = false;
        btn.querySelector('span').textContent = `Pay ₹${pendingData.price}`;
      }
    };

    init();
  </script>
</body>
</html>
