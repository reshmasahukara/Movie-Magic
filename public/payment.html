<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Checkout | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav></nav>

  <main class="container">
    <div class="auth-container" style="max-width: 600px;">
      <h2 style="margin-bottom: 2rem; color: var(--primary);">Secure Checkout</h2>
      
      <div id="booking-details" style="background: var(--glass); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
        <p style="color: var(--text-muted)">Loading ticket details...</p>
      </div>

      <form id="payment-form">
        <div class="form-group">
          <label>Cardholder Name</label>
          <input type="text" id="card-name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Card Number</label>
          <input type="text" id="card-number" placeholder="4567 •••• •••• 1234" required>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label>Expiry (MM/YY)</label>
            <input type="text" placeholder="12/28" required>
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="password" placeholder="•••" required>
          </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem; font-size: 1.1rem;" id="pay-btn">
          Pay Now
        </button>
      </form>

      <p style="text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 1.5rem;">
        🔒 This is a simulated secure payment environment.
      </p>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    let pendingData = null;

    async function init() {
      const stored = localStorage.getItem('pending_booking');
      if (!stored) {
        UI.showMessage('No pending booking found. Redirecting...');
        setTimeout(() => window.location.href = '/', 1500);
        return;
      }

      pendingData = JSON.parse(stored);

      document.getElementById('booking-details').innerHTML = `
        <h4 style="color: white; margin-bottom: 0.5rem;">${pendingData.movie_name}</h4>
        <p style="font-size: 0.9rem;">${pendingData.timmings} | ${new Date(pendingData.show_date).toLocaleDateString()}</p>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 0.5rem;">Seats: ${pendingData.seats.join(', ')}</p>
        <p style="font-size: 1.2rem; font-weight: bold; margin-top: 1rem; color: var(--primary);">Total: ₹${pendingData.price}</p>
      `;
      document.getElementById('pay-btn').textContent = `Pay ₹${pendingData.price}`;
    }

    document.getElementById('payment-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('pay-btn');
      btn.textContent = "Authorizing...";
      btn.disabled = true;

      try {
        // Step 1: Simulated Payment API Call
        const payRes = await API.fetch('/api/payment', {
          method: 'POST',
          body: JSON.stringify({
            amount: pendingData.price,
            card_name: document.getElementById('card-name').value
          })
        });

        UI.showMessage('Payment authorized. Generating tickets...', 'success');

        // Step 2: Final Booking API Call (Now that payment is confirmed)
        const bookRes = await API.fetch('/api/booking', {
          method: 'POST',
          body: JSON.stringify({
            ...pendingData,
            payment_status: 'Paid'
          })
        });

        // Step 3: Cleanup and Success
        localStorage.removeItem('pending_booking');
        UI.showMessage('Booking confirmed successfully!', 'success');
        setTimeout(() => window.location.href = '/history.html', 1500);

      } catch (err) {
        UI.showMessage(err.message);
        btn.textContent = `Pay ₹${pendingData.price}`;
        btn.disabled = false;
      }
    };

    init();
  </script>
</body>
</html>
