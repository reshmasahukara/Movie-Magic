<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Checkout | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="height: 100vh; display: flex; flex-direction: column;">
  <nav></nav>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="auth-container" style="margin: 0; width: 100%; max-width: 500px; padding: 2.5rem; position: relative; z-index: 1;">
      <h2 style="margin-bottom: 2rem; color: var(--primary); text-align: center;">Secure Checkout</h2>
      
      <div id="booking-details" style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid var(--glass);">
        <h4 id="txnTitle" style="color: white; font-size: 1.2rem; margin-bottom: 0.5rem; text-align: center;">Loading...</h4>
        <p id="txnMeta" style="font-size: 0.9rem; color: var(--text-muted); text-align: center;">Please wait</p>
        <div style="display: flex; justify-content: space-between; font-size: 1.25rem; margin-top: 1rem;">
          <span style="color: white;">Amount Due</span>
          <span id="txnAmount" style="color: var(--primary); font-weight: 800;">₹0</span>
        </div>
      </div>

      <form id="payment-form">
        <div class="form-group">
          <label>Cardholder Name</label>
          <input type="text" id="card-name" placeholder="Enter cardholder name" required>
        </div>
        <div class="form-group">
          <label>Card Number</label>
          <input type="text" id="card-num" placeholder="0000 0000 0000 0000" maxlength="19" required>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label>Expiry (MM/YY)</label>
            <input type="text" placeholder="12/28" maxlength="5" required>
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="password" placeholder="•••" maxlength="3" required>
          </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1.5rem; height: 55px; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 10px;" id="pay-btn" disabled>
          <span>Authorize Payment</span>
        </button>
      </form>

      <div style="margin-top: 1rem; text-align: center;">
        <p style="font-size: 0.7rem; color: #555;">Ref ID: <span id="bookingRef">#00000</span></p>
      </div>

      <div style="margin-top: 2rem; display: flex; align-items: center; justify-content: center; gap: 1rem; opacity: 0.5;">
        <img src="https://img.icons8.com/color/48/000000/visa.png" width="30">
        <img src="https://img.icons8.com/color/48/000000/mastercard.png" width="30">
        <p style="font-size: 0.75rem; color: var(--text-muted);">Secure Gateway</p>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    let checkoutData = null;

    async function getLoggedUser() {
      try {
        // Source 1: Standard API Helper
        if (typeof API.getSession === 'function') return API.getSession();
        
        // Source 2: Direct Local Storage (Multiple potential keys)
        const local = 
          JSON.parse(localStorage.getItem('movie_magic_user')) || 
          JSON.parse(localStorage.getItem('movieMagicUser')) ||
          JSON.parse(sessionStorage.getItem('movie_magic_user'));
          
        return local || null;
      } catch (e) { return null; }
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const type = params.get("type");
      const id = params.get("id");
      const qty = parseInt(params.get("qty")) || 1;

      // STEP 2: SUPPORT EVENT MODE
      if (type === "event" && id) {
         // Handle legacy ID redirect (e.g. 201 -> 5 for MI vs CSK)
         const safeId = (id === "201") ? "5" : id;
         await loadEventCheckout(safeId, qty);
         return;
      }

      // Old Movie Validation
      const stored = localStorage.getItem('paymentData');
      if (!stored) {
         UI.showMessage('Transaction data missing. Redirecting...');
         setTimeout(() => window.location.href = '/', 1500);
         return;
      }

      const movieData = JSON.parse(stored);
      checkoutData = { ...movieData, type: 'movie' };
      console.log("Payment Init (Movie):", checkoutData);
      
      // FIX: Aggressively enable button first to prevent "not working" state
      const payBtn = document.getElementById("pay-btn");
      if (payBtn) {
        payBtn.disabled = false;
        payBtn.style.opacity = "1";
        payBtn.style.cursor = "pointer";
        payBtn.querySelector("span").textContent = `Pay ₹${checkoutData.amount || 0}`;
      }
      
      // Render Movie Info
      document.getElementById("txnTitle").innerText = checkoutData.movie_name || "Movie Booking";
      document.getElementById("txnAmount").innerText = "₹" + (checkoutData.amount || 0);
      document.getElementById("bookingRef").innerText = checkoutData.booking_id || "#0000";
      
      if (checkoutData.theater_name) {
        document.getElementById("txnMeta").innerText = `${checkoutData.theater_name} • ${checkoutData.show_date || ''} • ${checkoutData.timmings || ''}`;
      } else {
        document.getElementById("txnMeta").innerText = "Ready for payment";
      }
    }

    async function loadEventCheckout(eventId, qty) {
       try {
          const res = await API.fetch(`/api/events?action=details&id=${eventId}`);
          if (!res.success) throw new Error("Event not found");

          const event = res.event;
          const price = Number(event.price || 499);
          const total = price * qty;

          document.getElementById("txnTitle").innerText = event.event_name;
          document.getElementById("txnAmount").innerText = "₹" + total;
          document.getElementById("bookingRef").innerText = "EV-" + Date.now();
          document.getElementById("txnMeta").innerText = `Qty: ${qty} • ${event.event_date}`;
          document.getElementById("pay-btn").disabled = false;
          document.getElementById("pay-btn").querySelector("span").textContent = `Pay ₹${total}`;

          checkoutData = {
             type: "event",
             eventId,
             qty,
             total,
             event
          };
       } catch (e) {
          console.error(e);
          document.getElementById("txnTitle").innerText = "Invalid Transaction";
          UI.showMessage("Unable to load event details. Redirecting...");
          setTimeout(() => window.location.href = "/", 1500);
       }
    }

    document.getElementById('payment-form').onsubmit = async (e) => {
      e.preventDefault();
      
      if (!checkoutData) {
        UI.showMessage("Transaction data missing.");
        return;
      }

      const btn = document.getElementById('pay-btn');
      btn.disabled = true;
      btn.querySelector('span').textContent = "Processing...";

      try {
        const user = await getLoggedUser();

        if (checkoutData?.type === "event") {
          const res = await API.fetch('/api/events?action=book', {
            method: 'POST',
            body: JSON.stringify({
              event_id: checkoutData.eventId,
              user_id: user?.user_id || user?.id || 'GUEST',
              user_name: user?.name || user?.username || 'Guest User',
              email: user?.email || 'guest@example.com',
              phone: user?.contact_no || user?.phone || 'Not Set',
              tickets_count: checkoutData.qty,
              amount: checkoutData.total
            })
          });

          if (!res.success) throw new Error(res.error || 'Payment failed');
          UI.showMessage('Event Booking Successful!', 'success');
          setTimeout(() => window.location.href = '/event-success.html', 1500);
          return;
        }

        // Movie Payment Flow
        await API.fetch('/api/payment', {
          method: 'POST',
          body: JSON.stringify({
            booking_id: checkoutData.booking_id,
            amount: checkoutData.amount,
            payment_method: 'Credit/Debit Card',
            card_name: document.getElementById('card-name').value
          })
        });

        UI.showMessage('Payment Successful!', 'success');
        localStorage.setItem('last_booking_id', checkoutData.booking_id);
        setTimeout(() => { window.location.href = '/success.html'; }, 1000);

      } catch (err) {
        UI.showMessage(err.message);
        btn.disabled = false;
        btn.querySelector('span').textContent = `Authorize Payment`;
      }
    };

    init();
  </script>
</body>
</html>
