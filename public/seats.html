<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Seats | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .screen-header { margin: 3rem 0; width: 100%; display: flex; flex-direction: column; align-items: center; }
    .screen-line { width: 80%; height: 4px; background: #333; border-radius: 50%; box-shadow: 0 10px 30px rgba(229, 9, 20, 0.4); margin-bottom: 10px; }
    .screen-text { color: #555; font-size: 0.75rem; letter-spacing: 5px; text-transform: uppercase; }
    
    .seats-grid-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 2rem 0; padding: 1rem; overflow: visible; }
    .seat-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .row-label { width: 30px; text-align: right; margin-right: 15px; color: #555; font-weight: 700; font-size: 0.85rem; }
    
    .seat-num { font-size: 0.65rem; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
    .seat:hover .seat-num { opacity: 1; }

    .category-divider { width: 100%; margin: 1.5rem 0 0.5rem; color: #333; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; text-align: left; padding-left: 45px; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; }
    
    @media (max-width: 768px) {
      .seat-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">MOVIE MAGIC</a>
    <div class="links">
      <a href="/">Home</a>
      <a href="/dashboard.html">Dashboard</a>
    </div>
  </nav>

  <main class="container">
    <button onclick="window.history.back()" class="btn-primary" style="margin: 2rem 0; background: #1a1a1a; border: 1px solid #333;">← Back to Shows</button>

    <div class="screen-header">
      <div class="screen-line"></div>
      <div class="screen-text">Screen this way</div>
    </div>

    <div class="legend" style="margin-bottom: 3rem;">
      <div class="legend-item"><div class="seat"></div> Available</div>
      <div class="legend-item"><div class="seat selected"></div> Your Selection</div>
      <div class="legend-item"><div class="seat occupied"></div> Sold Out</div>
      <div style="flex-basis: 100%; height: 1px;"></div>
      <div class="legend-item"><div class="seat vip"></div> VIP (₹300)</div>
      <div class="legend-item"><div class="seat premium"></div> Premium (₹200)</div>
      <div class="legend-item"><div class="seat regular"></div> Regular (₹100)</div>
    </div>

    <h2 id="selected-show-title" style="text-align: center; margin-bottom: 1rem; font-weight: 800;">Select Seats</h2>
    
    <div class="seats-grid-wrapper" id="seats-grid">
      <!-- Injected by JS -->
    </div>

    <div class="booking-dock" style="background: #111; border-top: 1px solid #222; padding: 2rem 0; margin-top: 4rem;">
      <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <p id="selected-list" style="color: #666; font-size: 0.85rem; margin-bottom: 5px;">Seats: <span style="color: white; font-weight: 700;">None selected</span></p>
          <div id="seat-breakdown" style="font-size: 0.75rem; color: #444;"></div>
        </div>
        <div style="text-align: right;">
          <p style="font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px;">Total Payable</p>
          <p style="font-size: 1.8rem; font-weight: 900; color: var(--primary);">₹<span id="total-price">0</span></p>
          <button class="btn-primary" id="book-btn" onclick="confirmBooking()" style="margin-top: 10px; min-width: 200px;">Pay Now</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('movieId');
    const showId = urlParams.get('showId');
    let currentShow = null;
    let selectedSeats = [];

    const CATEGORIES = {
      VIP: { price: 300, rows: ['A', 'B'], css: 'vip' },
      PREMIUM: { price: 200, rows: ['C', 'D', 'E'], css: 'premium' },
      REGULAR: { price: 100, rows: ['F', 'G', 'H'], css: 'regular' }
    };

    async function init() {
      if (!movieId || !showId) return window.location.href = '/';
      await loadSpecificShow(showId);
    }

    // Client-Side Mock Registry for instant resolve if API is slow/failed
    const LOCAL_MOCK = {
      "101": { theater_name: "Cinepolis: Nexus", timmings: "10:15 AM", price: 150 },
      "102": { theater_name: "Cinepolis: Nexus", timmings: "06:05 PM", price: 250 },
      "201": { theater_name: "INOX: DN Regalia Mall", timmings: "10:45 AM", price: 200 },
      "202": { theater_name: "INOX: DN Regalia Mall", timmings: "07:40 PM", price: 300 },
      "301": { theater_name: "INOX: Symphony Mall", timmings: "04:00 PM", price: 180 },
      "401": { theater_name: "PVR: Utkal Kanika Galleria", timmings: "01:15 PM", price: 220 },
      "501": { theater_name: "PJ Movies (Veena Theatre)", timmings: "06:00 PM", price: 120 }
    };

    let movieName = "Movie Magic";

    async function loadSpecificShow(id) {
      console.log("Fetching Show ID:", id);
      try {
        // Fetch Movie Details first to get real name
        if (movieId) {
          try {
            const { movies } = await API.fetch('/api/movies');
            const movie = movies.find(m => m.movie_id === movieId);
            if (movie) movieName = movie.movie_name;
          } catch (e) { console.warn("Movie meta fetch failed"); }
        }

        const data = await API.fetch(`/api/shows?id=${id}`);
        console.log("API Response:", data);

        if (data && data.success && data.show) {
          currentShow = data.show;
        } else if (LOCAL_MOCK[id]) {
          console.warn("API returned no data, using Local Mock for ID:", id);
          currentShow = { screen_id: id, selected_seats: [], ...LOCAL_MOCK[id] };
        } else {
          throw new Error("Show details not found in API or Local Cache.");
        }

        const theaterName = currentShow?.theater_name || "Movie Magic Cinemas";
        const showTime = currentShow?.timmings || "00:00";
        document.getElementById('selected-show-title').textContent = `${movieName} | ${theaterName}`;
        loadSeatsGrid();

      } catch (err) {
        console.error("Show Load Error:", err);
        // Final desperate fallback if even LOCAL_MOCK fails
        if (LOCAL_MOCK[id]) {
           currentShow = { screen_id: id, selected_seats: [], ...LOCAL_MOCK[id] };
           const theaterName = currentShow?.theater_name;
           const showTime = currentShow?.timmings;
           document.getElementById('selected-show-title').textContent = `${theaterName} | ${showTime}`;
           loadSeatsGrid();
        } else {
           UI.showMessage("Failed to load show details", "error");
        }
      }
    }

    function loadSeatsGrid() {
      const grid = document.getElementById('seats-grid');
      const occupied = currentShow.selected_seats || [];
      grid.innerHTML = '';
      selectedSeats = [];
      updateSummary();

      const seatsPerRow = 10;
      const rows = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

      rows.forEach((row) => {
        // Add Category Divider (Use DOM method to preserve listeners)
        if (row === 'A' || row === 'C' || row === 'F') {
          const divider = document.createElement('div');
          divider.className = 'category-divider';
          divider.textContent = row === 'A' ? 'VIP Seating (Rows A-B)' : (row === 'C' ? 'Premium Seating (Rows C-E)' : 'Regular Seating (Rows F-H)');
          grid.appendChild(divider);
        }

        const rowDiv = document.createElement('div');
        rowDiv.className = 'seat-row';
        
        const rowLabel = document.createElement('div');
        rowLabel.className = 'row-label';
        rowLabel.textContent = row;
        rowDiv.appendChild(rowLabel);

        for (let i = 1; i <= seatsPerRow; i++) {
          const seatId = `${row}${i}`;
          const seat = document.createElement('div');
          let category = 'REGULAR';
          if (CATEGORIES.VIP.rows.includes(row)) category = 'VIP';
          else if (CATEGORIES.PREMIUM.rows.includes(row)) category = 'PREMIUM';

          seat.className = `seat ${CATEGORIES[category].css} ${occupied.includes(seatId) ? 'occupied' : ''}`;
          seat.innerHTML = `<span class="seat-num">${i}</span>`;
          seat.onclick = () => toggleSeat(seat, seatId, category);
          rowDiv.appendChild(seat);
        }
        grid.appendChild(rowDiv);
      });
    }

    function toggleSeat(el, id, categoryName) {
      if (el.classList.contains('occupied')) return;
      const isSelected = el.classList.toggle('selected');
      if (isSelected) {
        selectedSeats.push({ id, type: categoryName, price: CATEGORIES[categoryName].price });
      } else {
        selectedSeats = selectedSeats.filter(s => s.id !== id);
      }
      updateSummary();
    }

    function updateSummary() {
      const listEl = document.getElementById('selected-list');
      const breakdownEl = document.getElementById('seat-breakdown');
      const totalEl = document.getElementById('total-price');

      if (selectedSeats.length === 0) {
        listEl.innerHTML = 'Seats: <span style="color: white; font-weight: 700;">None selected</span>';
        breakdownEl.innerHTML = '';
        totalEl.textContent = '0';
        return;
      }

      const seatNames = selectedSeats.map(s => s.id).join(', ');
      listEl.innerHTML = `Seats: <span style="color: white; font-weight: 700; border: 1px solid #333; padding: 2px 8px; border-radius: 4px;">${seatNames}</span>`;
      
      const total = selectedSeats.reduce((sum, s) => sum + s.price, 0);
      totalEl.textContent = total;

      const types = [...new Set(selectedSeats.map(s => s.type))];
      breakdownEl.innerHTML = types.map(type => {
        const count = selectedSeats.filter(s => s.type === type).length;
        return `<span>${type} × ${count}</span>`;
      }).join(' • ');
    }

    async function confirmBooking() {
      if (selectedSeats.length === 0) return UI.showMessage('Please select at least one seat');
      
      const user = API.getSession();
      if (!user) return UI.showMessage('Please login to continue');

      const btn = document.getElementById('book-btn');
      btn.disabled = true;
      btn.textContent = 'Locking seats...';

      try {
        const total = selectedSeats.reduce((sum, s) => sum + s.price, 0);
        
        // POST to booking will perform the Overlap check on server
        const res = await API.fetch('/api/booking', {
          method: 'POST',
          body: JSON.stringify({
            screenid: currentShow.screen_id,
            user_id: user.user_id,
            movie_id: movieId, // Explicitly pass movie identity
            noofseats: selectedSeats.length,
            seats: selectedSeats.map(s => s.id),
            price: total,
            payment_status: 'Pending'
          })
        });

        const theaterName = currentShow?.theater_name || "Movie Magic Cinemas";
        localStorage.setItem('paymentData', JSON.stringify({
          booking_id: res.bookingId,
          amount: total,
          movie_name: movieName,
          theater_name: theaterName,
          timmings: currentShow.timmings,
          show_date: currentShow.show_date,
          seats: selectedSeats.map(s => s.id)
        }));

        window.location.href = '/payment.html';

      } catch (err) {
        UI.showMessage(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Pay Now';
        // Refresh grid to show newly occupied seats
        await loadSpecificShow(showId);
      }
    }

    init();
  </script>
</body>
</html>
