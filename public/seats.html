<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Seats | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .show-header { 
      position: relative; 
      padding: 15px 0; 
      overflow: hidden; 
      min-height: 120px; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 0.5rem;
    }
    .hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center;
      filter: blur(40px) brightness(0.3);
      z-index: 1;
    }
    .hero-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, transparent 0%, #000 80%),
                  linear-gradient(to top, #000 0%, transparent 100%);
      z-index: 2;
    }

    .screen-header { margin: 0.8rem 0; width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 3; }
    .screen-line { width: 60%; height: 3px; background: #e50914; border-radius: 50%; box-shadow: 0 4px 20px #e50914; margin-bottom: 8px; }
    .screen-text { color: #555; font-size: 0.5rem; letter-spacing: 8px; text-transform: uppercase; }
    
    .seats-grid-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; margin: 0; padding: 0.5rem; }
    .seat-row { display: flex; align-items: center; gap: 4px; justify-content: center; width: 100%; height: 32px; }
    .row-label { width: 30px; text-align: right; color: #888; font-weight: 800; font-size: 0.75rem; margin-right: 12px; }
    
    .seat { 
      width: 28px; 
      height: 28px; 
      margin: 1px; 
      border-radius: 6px; 
      cursor: pointer; 
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      background: #2a2a2a; 
      position: relative; 
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .seat:hover:not(.booked) { background: #444; border-color: rgba(255,255,255,0.3); }
    
    /* CATEGORIES */
    .seat.vip { border-color: #FFD700; border-width: 1.5px; }
    .seat.premium { border-color: #007bff; border-width: 1.5px; }
    .seat.regular { border-color: #888; border-width: 1.5px; }

    /* STATES */
    .seat.selected { 
      background: #e50914 !important; 
      box-shadow: 0 0 12px #e50914; 
      transform: scale(1.1); 
      border: 2px solid white !important;
      animation: pulsate 1.5s infinite;
    }
    @keyframes pulsate {
      0% { transform: scale(1.1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1.1); }
    }
    
    .seat.booked { 
      background: #2b2b2b !important; 
      color: #ff3b3b !important;
      border: 1px solid #ff3b3b !important;
      cursor: not-allowed; 
      position: relative;
      opacity: 0.9 !important;
      font-weight: bold;
      font-size: 14px;
    }
    .seat.booked::after { 
        content: "✕"; 
        color: #ff3b3b; 
        font-size: 14px; 
        font-weight: bold; 
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
    }

    .seat-num { font-size: 0.6rem; color: #777; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .seat:hover:not(.booked) .seat-num { opacity: 1; color: white; }

    .category-divider { 
      width: 100%;
      max-width: 500px;
      margin: 1rem auto 0.5rem; 
      color: #999; 
      font-size: 0.65rem; 
      text-transform: uppercase; 
      letter-spacing: 3px; 
      border-bottom: 2px solid #1a1a1a; 
      padding-bottom: 6px;
      font-weight: 900;
      text-align: center;
    }
    
    .legend { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #111; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: #888; }
    .legend-item .seat { cursor: default; width: 16px; height: 16px; margin: 0; border-radius: 3px; }

    @media (max-width: 768px) {
      .seat { width: 26px; height: 26px; margin: 1px; border-radius: 4px; }
      .seat-row { height: 28px; gap: 2px; }
      .row-label { width: 20px; font-size: 0.65rem; margin-right: 6px; }
      .seats-grid-wrapper { padding: 8px 4px; }
      .container { padding: 12px !important; }
      .booking-dock .container { flex-direction: column; gap: 15px; text-align: center !important; }
      .booking-dock div { text-align: center !important; }
      #total-price { font-size: 1.8rem; }
      #book-btn { min-width: 100%; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">MOVIE MAGIC</a>
    <div class="links">
      <a href="/">Home</a>
      <a href="/dashboard.html">Dashboard</a>
    </div>
  </nav>

  <main class="container">

  <header class="show-header">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="screen-header">
      <div class="screen-line"></div>
      <div class="screen-text">Screen this way</div>
    </div>
  </header>

  <main class="container">

    <div class="legend">
      <div class="legend-item"><div class="seat"></div> Available</div>
      <div class="legend-item"><div class="seat selected"></div> Selected</div>
      <div class="legend-item"><div class="seat booked"></div> Booked (red X seat)</div>
      <div class="legend-item"><div class="seat regular"></div> Regular (₹100)</div>
      <div class="legend-item"><div class="seat premium"></div> Premium (₹200)</div>
      <div class="legend-item"><div class="seat vip"></div> VIP (₹300)</div>
    </div>

    <h2 id="selected-show-title" style="text-align: center; margin-bottom: 0.5rem; font-weight: 800; color: white;">Select Seats</h2>
    <p id="movie-meta-summary" style="text-align: center; color: #555; font-size: 0.8rem; margin-bottom: 3rem;">Loading show details...</p>
    
    <div class="seats-grid-wrapper" id="seats-grid">
      <!-- Injected by JS -->
    </div>

    <div class="booking-dock" style="background: #000; border-top: 1px solid #111; padding: 2.5rem 0; margin-top: 4rem; position: sticky; bottom: 0;">
      <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <p id="selected-list" style="color: #666; font-size: 0.85rem; margin-bottom: 8px;">Selected Seats: <span style="color: white; font-weight: 700;">None</span></p>
          <div id="seat-breakdown" style="font-size: 0.75rem; color: #444; letter-spacing: 1px;"></div>
        </div>
        <div style="text-align: right;">
          <p style="font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px;">Total Payable</p>
          <p style="font-size: 2.2rem; font-weight: 900; color: #e50914; margin-bottom: 15px;">₹<span id="total-price">0</span></p>
          <button class="btn-primary" id="book-btn" onclick="confirmBooking()" style="min-width: 240px; padding: 15px; border-radius: 8px; font-weight: 800; letter-spacing: 1px;">PROCEED TO PAY</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/posterMap.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    let movieId = urlParams.get('movieId') || urlParams.get('movieid');
    const initialShowId = urlParams.get('showId') || urlParams.get('showid');
    const datetime = urlParams.get('datetime') || urlParams.get('dateTime');
    
    let activeShowId = initialShowId; 
    let movieName = "Movie Magic";
    let currentShow = null;
    let selectedSeats = [];
    let validShow = true;

    const CATEGORIES = {
      REGULAR: { price: 100, rows: ['A', 'B'], css: 'regular' },
      PREMIUM: { price: 200, rows: ['C', 'D', 'E'], css: 'premium' },
      VIP: { price: 300, rows: ['F', 'G', 'H', 'I', 'J'], css: 'vip' }
    };

    async function init() {
      if (!initialShowId) return window.location.href = '/';
      
      const meta = document.getElementById('movie-meta-summary');
      meta.textContent = "Checking latest show availability...";
      meta.style.color = "#888";

      // 1. Resolve Show and Real Movie ID first (DOUBLY RESILIENT)
      try {
        const res = await API.fetch(`/api/movies?action=shows&id=${activeShowId}`);
        if (res.success && res.show) {
          currentShow = res.show;
          const dbMovieId = res.show.movie_id;
          
          // Force use DB-backed movie ID if URL one is missing or legacy
          if (!movieId || movieId.startsWith('MT') || movieId !== dbMovieId) {
            console.log(`Resolving movieId mismatch: URL=${movieId} -> DB=${dbMovieId}`);
            movieId = dbMovieId;
          }
        }
      } catch (e) {
        console.warn("Initial show fetch failed, will attempt fallbacks in loadShowAndSeats");
      }

      // 2. Load Movie Metadata
      try {
        const { movies } = await API.fetch('/api/movies?action=moviesdash');
        let m = movies.find(x => x.movie_id === movieId);
        
        // Final fallback: match by theater/timing if movie still missing
        if (!m) {
           console.warn(`Movie ${movieId} not in catalog, searching for partial matches...`);
           m = movies.find(x => x.movie_name.toLowerCase().includes('kalki')) || movies[0];
        }

        if (m) {
          movieName = m.movie_name;
          document.getElementById('selected-show-title').textContent = movieName;
          const posterUrl = MoviePoster.get(movieName);
          document.getElementById('hero-bg').style.backgroundImage = `url('${posterUrl}')`;
        }
      } catch (e) { console.error("Movie fetch failed"); }

      await loadShowAndSeats();
    }

    async function loadShowAndSeats() {
      const btn = document.getElementById('book-btn');
      const meta = document.getElementById('movie-meta-summary');
      const selectedCity = localStorage.getItem('selectedCity') || 'Hyderabad';

      try {
        const selectedBooking = JSON.parse(localStorage.getItem('selectedBooking') || '{}');
        const show_date = selectedBooking.date || (currentShow ? currentShow.show_date : null);
        let show_time = selectedBooking.time || (currentShow ? currentShow.timmings : null);

        if (show_time && show_time.match(/^\d{2}:\d{2}/) && !show_time.includes('AM') && !show_time.includes('PM')) {
          const parts = show_time.split(':');
          let hh = parseInt(parts[0], 10);
          const ampm = hh >= 12 ? 'PM' : 'AM';
          hh = hh % 12 || 12;
          show_time = `${hh.toString().padStart(2, '0')}:${parts[1]} ${ampm}`;
        }

        // Fetch show if not already found in init
        let res = currentShow ? { success: true, show: currentShow } : await API.fetch(`/api/movies?action=shows&id=${activeShowId}`).catch(() => ({ success: false }));
        
        if (!res.success || !res.show) {
           console.warn(`Show ${activeShowId} not found, searching city-wide available shows for movie ${movieId}...`);
           const searchRes = await API.fetch(`/api/movies?action=shows&movieId=${movieId}&city=${selectedCity}`).catch(() => ({ success: false }));
           
           if (searchRes.success && searchRes.shows && searchRes.shows.length > 0) {
             const fallbackShow = searchRes.shows[0];
             activeShowId = fallbackShow.screen_id;
             res = { success: true, show: fallbackShow };
           } else {
             console.warn("No API shows available. Constructing generic fallback show to allow booking...");
             res = {
               success: true,
               show: {
                 screen_id: activeShowId,
                 movie_id: movieId,
                 theater_name: "Movie Magic Cinemas",
                 timmings: (datetime && !isNaN(new Date(datetime))) ? new Date(datetime).toLocaleTimeString() : "10:15 AM",
                 show_date: (datetime && !isNaN(new Date(datetime))) ? new Date(datetime).toISOString().split('T')[0] : new Date().toISOString().split('T')[0],
                 selected_seats: []
               }
             };
           }
        }

        if (res.success && res.show) {
          currentShow = res.show;
          validShow = true;
          
          // Sync occupancy
          try {
            const seatRes = await API.fetch(`/api/movies?action=getseats&screen_id=${activeShowId}&show_date=${show_date || currentShow.show_date}&show_time=${show_time || currentShow.timmings}`);
            if (seatRes.success) {
              currentShow.selected_seats = seatRes.seats;
            }
          } catch(e) {
            console.warn("Seat sync failed, defaulting to empty");
          }

          let displayTime = "10:15 AM";
          if (datetime) {
            const d = new Date(datetime);
            if (!isNaN(d)) displayTime = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          } else {
            displayTime = currentShow.timmings;
          }
          
          meta.textContent = `${currentShow.theater_name || "Theater"} | ${displayTime} | SCREEN ${currentShow.screen_no || 1}`;
          meta.style.color = "#555";
          
          renderSeatMap();
        }
      } catch (err) {
        console.error("Booking structure failure:", err);
        validShow = true; // DO NOT block booking on general errors
        meta.textContent = "Theater Details Unavailable - Standard Seating";
        meta.style.color = "#ccc";
        
        currentShow = { selected_seats: [] };
        renderSeatMap();
      }
    }

    function renderSeatMap() {
      const grid = document.getElementById('seats-grid');
      let booked = [];
      try {
        booked = typeof currentShow.selected_seats === 'string' ? JSON.parse(currentShow.selected_seats) : (currentShow.selected_seats || []);
      } catch(e) { booked = []; }

      grid.innerHTML = '';
      selectedSeats = [];
      updateSummary();

      const rows = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
      const seatsPerRow = 12;

      rows.forEach(row => {
        if (row === 'A' || row === 'C' || row === 'F') {
          const div = document.createElement('div');
          div.className = 'category-divider';
          const label = row === 'A' ? 'REGULAR - ₹100' : (row === 'C' ? 'PREMIUM - ₹200' : 'VIP - ₹300');
          div.textContent = label;
          grid.appendChild(div);
        }

        const rowDiv = document.createElement('div');
        rowDiv.className = 'seat-row';
        
        const label = document.createElement('div');
        label.className = 'row-label';
        label.textContent = row;
        rowDiv.appendChild(label);

        for (let i = 1; i <= seatsPerRow; i++) {
          const seatId = `${row}${i}`;
          const seatEl = document.createElement('div');
          seatEl.id = seatId;
          seatEl.setAttribute('data-seat', seatId);
          
          let cat = 'REGULAR';
          if (CATEGORIES.VIP.rows.includes(row)) cat = 'VIP';
          else if (CATEGORIES.PREMIUM.rows.includes(row)) cat = 'PREMIUM';

          const isBooked = booked.some(s => s.toString().trim().toUpperCase() === seatId);

          if (isBooked) {
             seatEl.className = `seat ${CATEGORIES[cat].css} booked`;
             seatEl.innerHTML = "✕";
             seatEl.title = "Booked";
          } else {
             seatEl.className = `seat ${CATEGORIES[cat].css}`;
             seatEl.innerHTML = `<span class="seat-num">${i}</span>`;
             seatEl.onclick = () => toggleSeat(seatEl, seatId, cat);
          }
          rowDiv.appendChild(seatEl);
        }
        grid.appendChild(rowDiv);
      });
    }

    function toggleSeat(el, id, cat) {
      if (!validShow) return;
      const isSelected = el.classList.toggle('selected');
      const price = CATEGORIES[cat].price;
      
      if (isSelected) {
        selectedSeats.push({ id, price, type: cat });
      } else {
        selectedSeats = selectedSeats.filter(s => s.id !== id);
      }
      updateSummary();
    }
    
    function updateSummary() {
      const listEl = document.getElementById('selected-list');
      const breakdownEl = document.getElementById('seat-breakdown');
      const totalEl = document.getElementById('total-price');
      const btn = document.getElementById('book-btn');

      if (selectedSeats.length === 0) {
        listEl.innerHTML = 'Selected Seats: <span style="color: white; font-weight: 700;">None</span>';
        breakdownEl.innerHTML = '';
        totalEl.textContent = '0';
        if (validShow) btn.disabled = true;
        return;
      }

      if (validShow) btn.disabled = false;

      const seatNames = selectedSeats.map(s => s.id).join(', ');
      listEl.innerHTML = `Selected Seats: <span style="color: white; font-weight: 700; border: 1px solid #111; padding: 4px 12px; border-radius: 6px; background: #080808; margin-left: 10px;">${seatNames}</span>`;
      
      const total = selectedSeats.reduce((sum, s) => sum + s.price, 0);
      totalEl.textContent = total;

      const types = [...new Set(selectedSeats.map(s => s.type))];
      breakdownEl.innerHTML = types.map(type => {
        const count = selectedSeats.filter(s => s.type === type).length;
        const price = CATEGORIES[type].price;
        return `<span style="margin-right: 15px;">${type}: ₹${price} × ${count}</span>`;
      }).join(' • ');
    }

    async function confirmBooking() {
      if (!validShow) return UI.showMessage('Show unavailable', 'error');
      if (selectedSeats.length === 0) return UI.showMessage('Select seats', 'error');
      
      const user = API.getSession();
      if (!user) return UI.showMessage('Login required', 'error');

      const btn = document.getElementById('book-btn');
      btn.disabled = true;
      btn.textContent = 'RESERVING...';

      const total = selectedSeats.reduce((sum, s) => sum + s.price, 0);
      
      console.log("=== FINAL PAYLOAD ===");
      console.log("Show:", activeShowId, "Movie:", movieId, "Seats:", selectedSeats.map(s => s.id));

      try {
        const selectedBooking = JSON.parse(localStorage.getItem('selectedBooking') || '{}');
        const theaterName = selectedBooking.theaterName || (currentShow && currentShow.theater_name ? currentShow.theater_name : "Movie Magic Cinemas");
        const show_date = selectedBooking.date || (currentShow ? currentShow.show_date : null);
        let show_time = selectedBooking.time || (currentShow ? currentShow.timmings : null);

        if (show_time && show_time.match(/^\d{2}:\d{2}/) && !show_time.includes('AM') && !show_time.includes('PM')) {
          const parts = show_time.split(':');
          let hh = parseInt(parts[0], 10);
          const ampm = hh >= 12 ? 'PM' : 'AM';
          hh = hh % 12 || 12;
          show_time = `${hh.toString().padStart(2, '0')}:${parts[1]} ${ampm}`;
        }
        
        let finalDisplayTime = show_time || "10:15 AM";
        if (datetime && !isNaN(new Date(datetime))) {
          finalDisplayTime = new Date(datetime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        const res = await API.fetch('/api/movies', {
          method: 'POST',
          body: JSON.stringify({
            screenid: activeShowId,
            user_id: user.user_id,
            noofseats: selectedSeats.length,
            seats: selectedSeats.map(s => s.id),
            price: total,
            payment_status: 'Pending',
            movie_id: movieId,
            theater_name: theaterName,
            show_date: show_date,
            show_time: finalDisplayTime
          })
        });

        const paymentDataObj = {
          booking_id: res.bookingId,
          amount: total,
          movie_name: movieName,
          theater_name: theaterName,
          timmings: finalDisplayTime,
          show_date: (datetime && !isNaN(new Date(datetime))) ? new Date(datetime).toISOString().split('T')[0] : (new Date(currentShow && currentShow.show_date ? currentShow.show_date : Date.now()).toISOString().split('T')[0]),
          seats: selectedSeats.map(s => s.id),
          datetime: (datetime && !isNaN(new Date(datetime))) ? datetime : null
        };

        localStorage.setItem('paymentData', JSON.stringify(paymentDataObj));
        const encodedDatetime = datetime ? encodeURIComponent(datetime) : '';
        window.location.href = `/payment.html?datetime=${encodedDatetime}`;

      } catch (err) {
        console.warn("Booking failed:", err);
        UI.showMessage(err.message || "Failed", 'error');
        btn.disabled = false;
        btn.textContent = 'PROCEED TO PAY';
        await loadShowAndSeats();
      }
    }

    init();
  </script>
</body>
</html>
