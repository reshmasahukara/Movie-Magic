<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue Control | Movie Magic Staff</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root { --sidebar-width: 260px; --bg-darker: #050505; --accent: #E50914; }
    body { display: flex; background: var(--bg-darker); overflow: hidden; height: 100vh; font-family: 'Inter', sans-serif; }
    aside { width: var(--sidebar-width); height: 100vh; background: #0A0A0A; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 2rem 0; z-index: 100; }
    .nav-links { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; margin-top: 2rem; }
    .nav-item { padding: 14px 2rem; color: #666; text-decoration: none; font-weight: 700; transition: all 0.3s; cursor: pointer; border-left: 4px solid transparent; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
    .nav-item:hover, .nav-item.active { color: white; background: rgba(229, 9, 20, 0.05); border-left-color: var(--accent); }
    main { flex: 1; height: 100vh; overflow-y: auto; padding: 2.5rem; }
    
    .stats-header { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
    .stat-card { background: #111; padding: 1.8rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); position: relative; overflow: hidden; }
    .stat-card::after { content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 60px; background: linear-gradient(45deg, transparent, rgba(229,9,20,0.05)); border-radius: 50%; transform: translate(30%, -30%); }
    .stat-label { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; margin-bottom: 0.8rem; }
    .stat-val { font-size: 1.8rem; font-weight: 900; color: white; }

    .control-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
    .search-input { background: #111; border: 1px solid #222; padding: 12px 20px; border-radius: 12px; color: white; width: 300px; outline: none; transition: border-color 0.3s; }
    .search-input:focus { border-color: var(--accent); }
    
    .filter-group { display: flex; gap: 0.5rem; }
    .filter-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #222; background: #111; color: #777; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .table-container { background: #0A0A0A; border-radius: 24px; border: 1px solid rgba(255,255,255,0.03); overflow-x: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    table { width: 100%; border-collapse: collapse; min-width: 1000px; }
    th { text-align: left; padding: 1.2rem 1.5rem; background: rgba(255,255,255,0.01); color: #444; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
    td { padding: 1.2rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.02); color: #bbb; font-size: 0.9rem; }
    tr:hover { background: rgba(255,255,255,0.01); }

    .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; display: inline-block; }
    .status-paid { background: rgba(40, 167, 69, 0.1); color: #28a745; border: 1px solid rgba(40,167,69,0.2); }
    .status-pending { background: rgba(255, 193, 7, 0.1); color: #ffc107; border: 1px solid rgba(255,193,7,0.2); }
    .status-refunded { background: rgba(0, 123, 255, 0.1); color: #007bff; border: 1px solid rgba(0,123,255,0.2); }
    .status-failed { background: rgba(220, 53, 69, 0.1); color: #dc3545; border: 1px solid rgba(220,53,69,0.2); }

    .view-btn { padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 700; transition: background 0.3s; }
    .view-btn:hover { background: var(--accent); border-color: var(--accent); }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    .modal-box { background: #111; width: 100%; max-width: 500px; border-radius: 24px; border: 1px solid #222; padding: 2.5rem; position: relative; }
    .modal-close { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 1.5rem; color: #555; cursor: pointer; }
  </style>
</head>
<body>
  <aside>
    <div style="padding: 0 2rem;"><h2 style="color: var(--accent); font-weight: 900; letter-spacing: -1.5px; font-size: 1.8rem;">MOVIE MAGIC</h2></div>
    <div class="nav-links">
       <div class="nav-item active" onclick="switchTab('dash')">TRANSACTIONS</div>
       <div class="nav-item" onclick="switchTab('users')">CUSTOMERS</div>
       <div class="nav-item" onclick="switchTab('movies')">MOVIES</div>
       <div class="nav-item" onclick="switchTab('events')">EVENTS</div>
    </div>
    <div style="padding: 1rem 2rem;"><button onclick="logout()" style="width: 100%; background: #1a1a1a; border: 1px solid #333; color: #888; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 0.8rem;">SIGN OUT</button></div>
  </aside>

  <main>
    <div id="tab-dash" class="tab-content active">
      <div class="stats-header">
         <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-val" id="stat-total-rev">₹0</div></div>
         <div class="stat-card"><div class="stat-label">Today Sales</div><div class="stat-val" id="stat-today-rev" style="color: #28a745;">₹0</div></div>
         <div class="stat-card"><div class="stat-label">Movie Tickets</div><div class="stat-val" id="stat-movie-count">0</div></div>
         <div class="stat-card"><div class="stat-label">Event Passes</div><div class="stat-val" id="stat-event-count">0</div></div>
         <div class="stat-card"><div class="stat-label">Refunds</div><div class="stat-val" id="stat-refund-amt" style="color: #007bff;">₹0</div></div>
      </div>

      <div class="control-bar">
         <input type="text" class="search-input" id="tx-search" placeholder="Search by ID, Name, Email..." onkeyup="filterTxTable()">
         <div class="filter-group">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('Movie', this)">Movies</button>
            <button class="filter-btn" onclick="setFilter('Event', this)">Events</button>
            <button class="filter-btn" onclick="setFilter('Paid', this)">Paid</button>
            <button class="filter-btn" onclick="setFilter('Refunded', this)">Refunded</button>
         </div>
      </div>

      <div class="table-container">
         <table id="tx-table">
            <thead>
               <tr>
                  <th>Booking ID</th>
                  <th>Type</th>
                  <th>Customer</th>
                  <th>Contact Info</th>
                  <th>Item Name</th>
                  <th>Details</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Action</th>
               </tr>
            </thead>
            <tbody></tbody>
         </table>
      </div>
    </div>

    <!-- Modals and other tabs handled via JS -->
    <div id="tab-users" class="tab-content">...</div>
    <div id="tab-movies" class="tab-content">...</div>
    <div id="tab-events" class="tab-content">...</div>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="tx-modal">
     <div class="modal-box">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <h2 style="margin-bottom: 2rem; border-bottom: 1px solid #222; padding-bottom: 1rem;">Transaction Details</h2>
        <div id="modal-content" style="line-height: 1.8;"></div>
     </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    let allTransactions = [];
    let activeFilter = 'all';

    async function loadDashboard() {
       try {
          // 1. Stats
          const sRes = await API.fetch('/api/admin-dashboard');
          if (sRes.success) {
             document.getElementById('stat-total-rev').innerText = `₹${sRes.stats.totalRevenue}`;
             document.getElementById('stat-today-rev').innerText = `₹${sRes.stats.todayRevenue}`;
             document.getElementById('stat-movie-count').innerText = sRes.stats.movieBookings;
             document.getElementById('stat-event-count').innerText = sRes.stats.eventBookings;
             document.getElementById('stat-refund-amt').innerText = `₹${sRes.stats.refundAmount}`;
          }

          // 2. Transactions
          const tRes = await API.fetch('/api/admin-bookings');
          if (tRes.success) {
             allTransactions = tRes.list;
             renderTable(allTransactions);
          }
       } catch (err) { console.error(err); }
    }

    function renderTable(data) {
       const tbody = document.querySelector('#tx-table tbody');
       tbody.innerHTML = data.map(tx => {
          const statusClass = `status-${(tx.status || 'pending').toLowerCase()}`;
          return `
             <tr>
                <td style="font-weight: 800; color: white;">${tx.display_id}</td>
                <td><span style="font-size: 0.7rem; color: #555; background: #1a1a1a; padding: 2px 6px; border-radius: 4px;">${tx.type}</span></td>
                <td style="color: white; font-weight: 700;">${tx.customer_name || 'Guest'}</td>
                <td style="font-size: 0.75rem;">${tx.customer_email || '--'}</td>
                <td style="color: white; font-weight: 700;">${tx.item_name}</td>
                <td style="font-size: 0.75rem;">${tx.details}</td>
                <td style="color: var(--accent); font-weight: 900;">₹${tx.amount}</td>
                <td><span class="badge ${statusClass}">${tx.status}</span></td>
                <td style="font-size: 0.7rem;">${new Date(tx.created_at).toLocaleString()}</td>
                <td><button class="view-btn" onclick="viewDetails('${tx.display_id}')">VIEW</button></td>
             </tr>
          `;
       }).join('');
    }

    function setFilter(filter, btn) {
       activeFilter = filter;
       document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
       btn.classList.add('active');
       filterTxTable();
    }

    function filterTxTable() {
       const query = document.getElementById('tx-search').value.toLowerCase();
       let filtered = allTransactions;

       if (activeFilter !== 'all') {
          filtered = filtered.filter(tx => tx.type === activeFilter || tx.status === activeFilter);
       }

       if (query) {
          filtered = filtered.filter(tx => 
             tx.display_id.toLowerCase().includes(query) ||
             tx.customer_name?.toLowerCase().includes(query) ||
             tx.customer_email?.toLowerCase().includes(query) ||
             tx.item_name.toLowerCase().includes(query)
          );
       }

       renderTable(filtered);
    }

    function viewDetails(id) {
       const tx = allTransactions.find(t => t.display_id === id);
       if (!tx) return;
       
       document.getElementById('modal-content').innerHTML = `
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
             <div><p style="color: #666;">Booking ID</p><p style="color: white; font-weight: 800;">${tx.display_id}</p></div>
             <div><p style="color: #666;">Type</p><p style="color: white; font-weight: 800;">${tx.type}</p></div>
             <div><p style="color: #666;">Customer</p><p style="color: white; font-weight: 800;">${tx.customer_name}</p></div>
             <div><p style="color: #666;">Email</p><p style="color: white; font-weight: 800; font-size: 0.8rem;">${tx.customer_email}</p></div>
             <div style="grid-column: span 2;"><p style="color: #666;">Item</p><p style="color: white; font-weight: 800;">${tx.item_name}</p></div>
             <div><p style="color: #666;">Amount</p><p style="color: var(--accent); font-weight: 900; font-size: 1.2rem;">₹${tx.amount}</p></div>
             <div><p style="color: #666;">Status</p><p style="color: white; font-weight: 800;">${tx.status}</p></div>
          </div>
          <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #222;">
             <p style="color: #666;">Service Metadata</p>
             <p style="font-size: 0.8rem;">Date: ${new Date(tx.created_at).toLocaleString()}</p>
             <p style="font-size: 0.8rem;">Details: ${tx.details}</p>
          </div>
       `;
       document.getElementById('tx-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('tx-modal').style.display = 'none'; }
    function logout() { localStorage.removeItem('adminUser'); window.location.href = '/admin-login.html'; }
    function switchTab(t) { /* Mock for now, same as previous implementation */ alert('Switching to ' + t); }

    window.onload = loadDashboard;
  </script>
</body>
</html>
