<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-grid { display: grid; grid-template-columns: 250px 1fr; gap: 2rem; margin-top: 2rem; }
    .sidebar { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; height: fit-content; }
    .sidebar button { width: 100%; text-align: left; padding: 1rem; background: transparent; border: none; color: var(--text-muted); cursor: pointer; border-radius: 8px; margin-bottom: 0.5rem; transition: all 0.3s; }
    .sidebar button.active { background: var(--primary); color: white; }
    .panel { background: var(--card-bg); border-radius: 12px; padding: 2rem; border: 1px solid var(--glass); }
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    th { text-align: left; color: var(--text-muted); padding: 1rem; border-bottom: 1px solid var(--glass); }
    td { padding: 1rem; border-bottom: 1px solid var(--glass); font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav></nav>

  <main class="container">
    <div style="display: flex; gap: 1.5rem; margin-top: 2rem;">
      <div style="flex:1; background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--glass);">
        <p style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Total Revenue</p>
        <h2 id="metric-revenue" style="color: var(--primary); font-size: 2rem;">₹0</h2>
      </div>
      <div style="flex:1; background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--glass);">
        <p style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Tickets Sold</p>
        <h2 id="metric-tickets" style="font-size: 2rem;">0</h2>
      </div>
    </div>

    <div class="admin-grid">
      <div class="sidebar">
        <h4 style="margin-bottom: 1.5rem; color: var(--primary);">ADMIN PANEL</h4>
        <button class="active" onclick="switchTab('movies')">Movies Management</button>
        <button onclick="switchTab('events')">Events Management</button>
        <button onclick="switchTab('theaters')">Theaters</button>
        <button onclick="switchTab('bookings')">Recent Sales</button>
      </div>

      <div class="panel">
        <div id="movies-tab">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Manage Movies</h3>
            <button class="btn-primary" onclick="addMoviePrompt()">+ Add Movie</button>
          </div>
          <table id="movies-table">
            <thead><tr><th>Movie</th><th>ID</th><th>Genre</th><th>Rating</th><th>Action</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>

        <div id="events-tab" style="display: none;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Manage Events</h3>
            <button class="btn-primary" onclick="addEventPrompt()">+ Add Event</button>
          </div>
          <table id="events-table">
            <thead><tr><th>Event</th><th>Category</th><th>City</th><th>Price</th><th>Action</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>

        <div id="theaters-tab" style="display: none;">
          <h3>Theaters & Locations</h3>
          <table id="theaters-table">
            <thead><tr><th>Theater Name</th><th>City</th><th>Shows</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>

        <div id="bookings-tab" style="display: none;">
          <h3>Overall Booking System History</h3>
          <table id="bookings-table">
            <thead><tr><th>ID</th><th>User</th><th>Movie</th><th>Total</th><th>Status</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    async function loadAdminData() {
      const adminRaw = localStorage.getItem('adminSession');
      if (!adminRaw) { 
         window.location.href = '/admin-login.html'; 
         return; 
      }
      
      const adminUser = JSON.parse(adminRaw);
      if (!adminUser.isAdmin) {
         window.location.href = '/admin-login.html';
         return;
      }

      try {
        const { data } = await API.fetch('/api/admin?action=dash');
        
        // 0. Inject Analytics Map
        if (data.analytics) {
           document.getElementById('metric-revenue').textContent = `₹${data.analytics.revenue.toLocaleString()}`;
           document.getElementById('metric-tickets').textContent = data.analytics.totalTickets;
        }

        // 1. Populate Movies
        document.querySelector('#movies-table tbody').innerHTML = data.movies.map(m => `
          <tr>
            <td>${m.movie_name}</td>
            <td>${m.movie_id}</td>
            <td>${m.genre}</td>
            <td>⭐ ${m.movie_rating}</td>
            <td><button style="color: #E50914; background:none; border:none; cursor:pointer">Delete</button></td>
          </tr>
        `).join('');

        // 2. Populate Theaters
        document.querySelector('#theaters-table tbody').innerHTML = data.theaters.map(t => `
          <tr>
            <td>${t.theater_name}</td>
            <td>${t.city}</td>
            <td>${data.shows.filter(s => s.theater_id === t.theater_id).length} Active</td>
          </tr>
        `).join('');

        // 4. Populate Events
        document.querySelector('#events-table tbody').innerHTML = data.events.map(e => `
          <tr>
            <td>${e.event_name}</td>
            <td>${e.category}</td>
            <td>${e.city}</td>
            <td>₹${e.price}</td>
            <td><button onclick="deleteEvent(${e.id})" style="color: #E50914; background:none; border:none; cursor:pointer">Delete</button></td>
          </tr>
        `).join('');

        // 5. Populate Combined Bookings
        const bookingsTable = document.querySelector('#bookings-table tbody');
        const mBookings = (data.bookings || []).map(b => ({ ...b, type: 'Movie', name: b.movie_name, total: b.price, date: b.created_at }));
        const eBookings = (data.eventBookings || []).map(b => ({ ...b, type: 'Event', name: b.event_name, total: b.amount, date: b.booking_date }));
        
        const allBookings = [...mBookings, ...eBookings].sort((a,b) => new Date(b.date) - new Date(a.date));
        
        bookingsTable.innerHTML = allBookings.map(b => `
          <tr>
            <td>#${b.id}</td>
            <td>User ID ${b.user_id}</td>
            <td>[${b.type}] ${b.name || 'N/A'}</td>
            <td>₹${b.total}</td>
            <td><span class="status-badge status-${(b.status || b.payment_status || 'Paid').toLowerCase()}">${b.status || b.payment_status || 'Paid'}</span></td>
          </tr>
        `).join('');

      } catch (err) {
        UI.showMessage(err.message);
      }
    }

    async function addMoviePrompt() {
      const name = prompt("Enter Movie Name (e.g., INCEPTION):");
      if (!name) return;
      const genre = prompt("Enter Genre (e.g., Sci-Fi):");
      const movieId = "M" + Math.floor(Math.random() * 1000);

      try {
        const res = await API.fetch('/api/admin?action=addMovie', {
          method: 'POST',
          body: JSON.stringify({
            movieId: movieId,
            movieName: name,
            movieRating: "8.5",
            movieDimensions: "2D",
            movieGenre: genre,
            movieStatus: "Now Showing",
            movieLanguage: "English",
            theaterId: 1,
            Timmings: "05:00 PM",
            showdate: new Date().toISOString().split('T')[0],
            screenno: 1,
            screendimensions: "2D",
            noofseats: 60,
            selectedseats: []
          })
        });
        if (res.success) {
          UI.showMessage('Movie Added Successfully!', 'success');
          loadAdminData();
        }
      } catch (e) {
        UI.showMessage(e.message, 'error');
      }
    }

    async function deleteEvent(id) {
      if (!confirm('Are you sure you want to delete this event?')) return;
      try {
        await API.fetch('/api/events?action=manage', {
          method: 'DELETE',
          body: JSON.stringify({ id })
        });
        loadAdminData();
      } catch (e) {
        UI.showMessage(e.message);
      }
    }

    async function addEventPrompt() {
      const name = prompt("Enter Event Name:");
      if (!name) return;
      const cat = prompt("Category (Music/Comedy/Outdoor/Sports/Workshops):", "Music");
      const city = prompt("City:", "Mumbai");
      const price = prompt("Price:", "500");
      const venue = prompt("Venue:", "Grand Arena");

      try {
        const res = await API.fetch('/api/events?action=manage', {
          method: 'POST',
          body: JSON.stringify({
            event_name: name,
            category: cat,
            city: city,
            venue: venue,
            event_date: new Date().toISOString().split('T')[0],
            event_time: "07:00 PM",
            price: parseInt(price),
            total_seats: 100,
            image_url: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=600",
            description: "Exciting " + cat + " event in " + city,
            has_seat_map: false
          })
        });
        if (res.success) {
          UI.showMessage('Event Added!', 'success');
          loadAdminData();
        }
      } catch (e) {
        UI.showMessage(e.message);
      }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('movies-tab').style.display = 'none';
      document.getElementById('events-tab').style.display = 'none';
      document.getElementById('theaters-tab').style.display = 'none';
      document.getElementById('bookings-tab').style.display = 'none';
      
      document.getElementById(`${tabId}-tab`).style.display = 'block';
    }

    loadAdminData();
  </script>
</body>
</html>
