<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-grid { display: grid; grid-template-columns: 250px 1fr; gap: 2rem; margin-top: 2rem; }
    .sidebar { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; height: fit-content; }
    .sidebar button { width: 100%; text-align: left; padding: 1rem; background: transparent; border: none; color: var(--text-muted); cursor: pointer; border-radius: 8px; margin-bottom: 0.5rem; transition: all 0.3s; }
    .sidebar button.active { background: var(--primary); color: white; }
    .panel { background: var(--card-bg); border-radius: 12px; padding: 2rem; border: 1px solid var(--glass); }
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    th { text-align: left; color: var(--text-muted); padding: 1rem; border-bottom: 1px solid var(--glass); }
    td { padding: 1rem; border-bottom: 1px solid var(--glass); font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav></nav>

  <main class="container">
    <div class="admin-grid">
      <div class="sidebar">
        <h4 style="margin-bottom: 1.5rem; color: var(--primary);">ADMIN PANEL</h4>
        <button class="active" onclick="switchTab('movies')">Movies Management</button>
        <button onclick="switchTab('theaters')">Theaters</button>
        <button onclick="switchTab('bookings')">Recent Sales</button>
      </div>

      <div class="panel">
        <div id="movies-tab">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Manage Movies</h3>
            <button class="btn-primary" onclick="UI.showMessage('Add Movie Form Coming Soon')">+ Add Movie</button>
          </div>
          <table id="movies-table">
            <thead><tr><th>Movie</th><th>ID</th><th>Genre</th><th>Rating</th><th>Action</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>

        <div id="theaters-tab" style="display: none;">
          <h3>Theaters & Locations</h3>
          <table id="theaters-table">
            <thead><tr><th>Theater Name</th><th>City</th><th>Shows</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>

        <div id="bookings-tab" style="display: none;">
          <h3>Overall Booking System History</h3>
          <table id="bookings-table">
            <thead><tr><th>ID</th><th>User</th><th>Movie</th><th>Total</th><th>Status</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    async function loadAdminData() {
      const user = API.getSession();
      if (!user || user.name !== 'admin') { window.location.href = '/'; return; }

      try {
        const { data } = await API.fetch('/api/admin?action=dash');
        
        // 1. Populate Movies
        document.querySelector('#movies-table tbody').innerHTML = data.movies.map(m => `
          <tr>
            <td>${m.movie_name}</td>
            <td>${m.movie_id}</td>
            <td>${m.genre}</td>
            <td>⭐ ${m.movie_rating}</td>
            <td><button style="color: #E50914; background:none; border:none; cursor:pointer">Delete</button></td>
          </tr>
        `).join('');

        // 2. Populate Theaters
        document.querySelector('#theaters-table tbody').innerHTML = data.theaters.map(t => `
          <tr>
            <td>${t.theater_name}</td>
            <td>${t.city}</td>
            <td>${data.shows.filter(s => s.theater_id === t.theater_id).length} Active</td>
          </tr>
        `).join('');

        // 3. Populate Bookings
        const bookingsTable = document.querySelector('#bookings-table tbody');
        // Fetch global bookings (admin action)
        const allBookings = data.bookings || [];
        bookingsTable.innerHTML = allBookings.map(b => `
          <tr>
            <td>#${b.id}</td>
            <td>User ID ${b.user_id}</td>
            <td>${b.movie_name || 'N/A'}</td>
            <td>₹${b.price}</td>
            <td><span class="status-badge status-${b.status}">${b.status}</span></td>
          </tr>
        `).join('');

      } catch (err) {
        UI.showMessage(err.message);
      }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('movies-tab').style.display = 'none';
      document.getElementById('theaters-tab').style.display = 'none';
      document.getElementById('bookings-tab').style.display = 'none';
      
      document.getElementById(`${tabId}-tab`).style.display = 'block';
    }

    loadAdminData();
  </script>
</body>
</html>
