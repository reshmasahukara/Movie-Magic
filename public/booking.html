<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theaters Selection | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .show-header { 
      position: relative; 
      padding: 0; 
      overflow: hidden; 
      min-height: 420px; 
      display: flex; 
      align-items: center; 
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center;
      filter: blur(50px) brightness(0.4);
      transform: scale(1.1);
      z-index: 1;
      pointer-events: none;
    }
    .hero-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to right, #000 0%, transparent 60%, transparent 80%, #000 100%),
                  linear-gradient(to top, #000 0%, transparent 50%);
      z-index: 2;
      pointer-events: none;
    }
    .hero-content {
      position: relative; 
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 60px;
      padding: 60px 0;
      width: 100%;
    }
    
    #movie-poster {
      width: 220px;
      height: 320px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #movie-poster:hover { transform: scale(1.05); }

    .hero-details { flex: 1; }
    .hero-details h1 { font-size: 3rem; font-weight: 900; margin-bottom: 1.2rem; color: white; line-height: 1.1; }
    
    .meta-group { display: flex; align-items: center; gap: 15px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .rating-badge { 
      background: rgba(255,255,255,0.1); 
      backdrop-filter: blur(10px);
      padding: 8px 16px; 
      border-radius: 12px; 
      display: flex; 
      align-items: center; 
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .status-tag { 
      font-size: 0.7rem; 
      font-weight: 800; 
      text-transform: uppercase; 
      padding: 4px 12px; 
      border-radius: 6px; 
      background: var(--primary); 
    }
    .info-pill { color: #ccc; font-size: 0.9rem; font-weight: 500; }
    
    .chip-group { display: flex; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap; }
    .chip-item { 
      background: rgba(255,255,255,0.05); 
      border: 1px solid rgba(255,255,255,0.1); 
      padding: 6px 14px; 
      border-radius: 30px; 
      font-size: 0.75rem; 
      color: #999; 
    }
    
    .movie-tagline { 
      font-size: 1rem; 
      color: var(--text-muted); 
      max-width: 600px; 
      line-height: 1.6; 
      font-style: italic;
    }

    @media (max-width: 768px) {
      .hero-content { flex-direction: column; text-align: center; gap: 20px; padding: 30px 12px; }
      #movie-poster { width: 160px; height: 220px; margin: 0 auto; }
      .hero-details h1 { font-size: 22px !important; margin-bottom: 0.8rem; }
      .meta-group, .chip-group { justify-content: center; gap: 10px; }
      .rating-badge { padding: 4px 10px; }
      .info-pill { font-size: 0.8rem; }
      
      .date-bar { gap: 10px; padding: 1rem 0; }
      .date-item { min-width: 55px; height: 65px; }
      
      .theater-card { padding: 1rem; width: 100%; border-radius: 8px; }
      .timing-btn { padding: 6px 12px; font-size: 0.75rem; flex: 1; min-width: 80px; }
      
      .container { padding: 12px !important; }
    }

    .date-bar { 
      display: flex; 
      gap: 15px; 
      overflow-x: auto; 
      padding: 1.5rem 0; 
      scrollbar-width: none; 
      border-bottom: 1px solid #333;
    }
    .date-bar::-webkit-scrollbar { display: none; }
    .date-item { 
      min-width: 60px; 
      height: 75px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      border-radius: 8px; 
      cursor: pointer; 
      transition: all 0.3s;
      border: 1px solid transparent;
      color: #777;
    }
    .date-item.active { background: var(--primary); color: white; transform: scale(1.05); }
    .date-item:hover:not(.active) { border-color: var(--primary); color: #ccc; }

    .filters-bar { display: flex; gap: 1rem; padding: 1.5rem 0; flex-wrap: wrap; }
    .filter-chip { 
      padding: 6px 16px; 
      border: 1px solid #444; 
      border-radius: 20px; 
      font-size: 0.85rem; 
      cursor: pointer; 
      transition: 0.3s;
      color: #999;
    }
    .filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; }

    .show-times-container, .show-row,
    .theater-card { 
      background: var(--card-bg); 
      border: 1px solid var(--glass); 
      border-radius: 12px; 
      padding: 1.5rem; 
      margin-bottom: 1.5rem; 
      pointer-events: auto;
      position: relative;
      z-index: 10;
    }
    .show-time-btn { 
      padding: 8px 18px; 
      border: 1px solid #28a745; 
      border-radius: 4px; 
      background: transparent; 
      color: #28a745; 
      font-weight: 500; 
      cursor: pointer; 
      pointer-events: auto !important;
      position: relative;
      z-index: 999;
      transition: 0.3s;
      font-size: 0.8rem;
      text-align: center;
    }
    .show-time-btn:hover { background: #28a745; color: white; }
    
    .label-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #333; color: #666; margin-left: 10px; text-transform: uppercase; }
  </style>
</head>
<body>
  <nav></nav>

  <header class="show-header" id="hero-section">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="container hero-content">
      <img id="movie-poster" src="" alt="" style="display: none;" onerror="this.onerror=null;this.src='/images/default-poster.jpg';">
      <div class="hero-details">
        <div class="meta-group">
          <span class="status-tag" id="movie-status">Loading</span>
          <div class="rating-badge">
            <span style="color: #FFB800; font-size: 1.2rem;">★</span>
            <span id="movie-rating" style="font-weight: 800; font-size: 1.1rem;">0.0</span>
            <span style="color: #666; font-size: 0.8rem; margin-top: 2px;">/ 10</span>
          </div>
        </div>
        <h1 id="movie-title">Movie Title</h1>
        
        <div class="chip-group" id="movie-chips">
          <!-- Chips injected by JS -->
        </div>

        <div class="meta-group" style="margin-bottom: 2rem;">
          <span class="info-pill" id="movie-duration">0h 00m</span>
          <span style="color: #444;">•</span>
          <span class="info-pill" id="movie-language">Language</span>
        </div>

        <p class="movie-tagline" id="movie-tagline">Loading movie tagline...</p>

        <div style="margin-top: 1.5rem; display: flex; align-items: center; gap: 0.8rem; background: rgba(255,255,255,0.05); padding: 0.8rem 1.2rem; border-radius: 12px; width: fit-content; border: 1px solid rgba(255,255,255,0.1);">
          <span style="font-size: 0.8rem; color: #888; text-transform: uppercase;">Rate Movie:</span>
          <div style="display: flex; gap: 4px; cursor: pointer;" onclick="UI.showMessage('Thanks for your rating! ⭐', 'success')">
            <span style="color: #FFB800; font-size: 1.2rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">★</span>
            <span style="color: #FFB800; font-size: 1.2rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">★</span>
            <span style="color: #FFB800; font-size: 1.2rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">★</span>
            <span style="color: #FFB800; font-size: 1.2rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">★</span>
            <span style="color: #555; font-size: 1.2rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">★</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Date Selector -->
    <div class="date-bar" id="date-selector"></div>

    <!-- Filters -->
    <div class="filters-bar" id="filters-container">
      <button class="filter-chip active" data-filter="all">All Shows</button>
      <button class="filter-chip" data-filter="price-low">₹0 - ₹200</button>
      <button class="filter-chip" data-filter="price-high">₹201+</button>
      <button class="filter-chip" data-filter="3d">3D Only</button>
      <button class="filter-chip" data-filter="2d">2D Only</button>
    </div>

    <!-- Theater List -->
    <div id="theater-list" style="margin-top: 2rem;">
      <!-- Content injected by JS -->
    </div>
  </main>

  <script src="js/posterMap.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id'); 
    let selectedCity = localStorage.getItem('selectedCity') || 'all'; // Default to 'all'
    let selectedDate = new Date().toISOString().split('T')[0];
    let activeFilter = 'all';
    let currentMovie = null;

    function getFallbackMovies() {
      return [
        { movie_id: 'M001', movie_name: 'RAAKA', movie_rating: '9.2', language: 'Telugu/Hindi', genre: 'Action/Thriller', status: 'Coming Soon', duration: '155 min', description: 'A high-octane action epic.' },
        { movie_id: 'M002', movie_name: 'OG', movie_rating: '9.5', language: 'Telugu', genre: 'Gangster Drama', status: 'Running', duration: '165 min', description: 'The original gangster returns to reclaim his throne.' },
        { movie_id: 'M003', movie_name: 'SPIRIT', movie_rating: '9.0', language: 'Multi-Language', genre: 'Crime/Action', status: 'In Production', duration: '170 min', description: 'A gripping police procedural drama.' },
        { movie_id: 'M004', movie_name: 'VARANASI', movie_rating: '8.8', language: 'Hindi', genre: 'Spiritual/Drama', status: 'Now Showing', duration: '140 min', description: 'A journey of self-discovery in the holy city.' },
        { movie_id: 'M005', movie_name: 'DRAGON', movie_rating: '8.5', language: 'English', genre: 'Fantasy/Action', status: 'Coming Soon', duration: '135 min', description: 'A tale of fire and blood.' },
        { movie_id: 'M006', movie_name: 'PUSHPA THE RULE', movie_rating: '9.8', language: 'Multi-Language', genre: 'Action/Drama', status: 'Running', duration: '180 min', description: 'The rule of Pushpa begins.' },
        { movie_id: 'M007', movie_name: 'BAHUBALI 2', movie_rating: '9.9', language: 'Multi-Language', genre: 'Epic/Action', status: 'Running', duration: '167 min', description: 'The conclusion to the epic saga.' },
        { movie_id: 'M008', movie_name: 'STRANGER THINGS S5', movie_rating: '9.7', language: 'English', genre: 'Sci-Fi/Horror', status: 'Coming Soon', duration: '150 min', description: 'The final chapter in Hawkins.' },
        { movie_id: 'M009', movie_name: 'AVENGERS END GAME', movie_rating: '9.6', language: 'English', genre: 'Superhero', status: 'Running', duration: '181 min', description: 'The grand finale of the infinity saga.' },
        { movie_id: 'MT002', movie_name: 'RRR', movie_rating: '9.7', language: 'Telugu/Hindi', genre: 'Action/Drama', status: 'Running', duration: '187 min', description: 'A tale of two legendary revolutionaries.' },
        { movie_id: 'MT003', movie_name: 'Kalki 2898 AD', movie_rating: '9.2', language: 'Telugu/Hindi', genre: 'Sci-Fi/Epic', status: 'Now Showing', duration: '181 min', description: 'A modern avatar of Vishnu descends to earth.' },
        { movie_id: 'MH001', movie_name: 'Avatar', movie_rating: '9.0', language: 'English', genre: 'Sci-Fi/Action', status: 'Running', duration: '162 min', description: 'A paraplegic Marine dispatched to the moon Pandora.' },
        { movie_id: 'MH003', movie_name: 'Titanic', movie_rating: '9.4', language: 'English', genre: 'Romance/Drama', status: 'Running', duration: '194 min', description: 'A seventeen-year-old aristocrat falls in love with a kind but poor artist.' },
        { movie_id: 'MH005', movie_name: 'Avengers: Infinity War', movie_rating: '9.5', language: 'English', genre: 'Superhero', status: 'Running', duration: '149 min', description: 'The Avengers must stop Thanos.' },
        { movie_id: 'MH006', movie_name: 'Spider-Man: No Way Home', movie_rating: '9.3', language: 'English', genre: 'Superhero', status: 'Running', duration: '148 min', description: 'Peter Parker seeks the help of Doctor Strange.' },
        { movie_id: 'MH007', movie_name: 'Jurassic World', movie_rating: '8.7', language: 'English', genre: 'Sci-Fi/Adventure', status: 'Running', duration: '124 min', description: 'A new theme park built on the original site.' },
        { movie_id: 'MB002', movie_name: 'Jawan', movie_rating: '9.3', language: 'Hindi', genre: 'Action/Thriller', status: 'Running', duration: '169 min' },
        { movie_id: 'MB007', movie_name: 'Gadar 2', movie_rating: '8.5', language: 'Hindi', genre: 'Action/Drama', status: 'Running', duration: '170 min' },
        { movie_id: 'MB008', movie_name: 'Sultan', movie_rating: '8.9', language: 'Hindi', genre: 'Sports/Drama', status: 'Running', duration: '170 min' }
      ];
    }

    async function init() {
      // Basic Auth Check
      if (!API.getSession()) {
        window.location.href = "/login.html";
        return;
      }
      
      renderDates();
      setupFilters();
      
      // 1. Fetch Movie Meta with Fallback
      try {
        const { movies: apiMovies } = await API.fetch(`/api/movies?action=moviesdash&city=${selectedCity}`);
        const fallbackMovies = getFallbackMovies();
        
        // Merge API data with fallbacks (API wins)
        const allMovies = [...fallbackMovies];
        if (apiMovies && apiMovies.length > 0) {
          apiMovies.forEach(am => {
            const idx = allMovies.findIndex(fm => fm.movie_id === am.movie_id);
            if (idx !== -1) allMovies[idx] = { ...allMovies[idx], ...am };
            else allMovies.push(am);
          });
        }

        movie = allMovies.find(m => m.movie_id === movieId);
        
        if(movie) {
          // Poster Logic
          const posterUrl = MoviePoster.get(movie.movie_name);
          const posterEl = document.getElementById('movie-poster');
          posterEl.src = posterUrl;
          posterEl.onerror = function() {
              this.onerror = null;
              this.src = (movie.movie_name.toLowerCase().includes('baahubali') || movie.movie_name.toLowerCase().includes('bahubali')) ? '/images/movies/baahubali-beginning.jpg' : '/images/default-poster.jpg';
          };
          posterEl.style.display = 'block';
          posterEl.alt = movie.movie_name;

          // Background Logic
          document.getElementById('hero-bg').style.backgroundImage = `url('${posterUrl}')`;

          // Text Content
          document.getElementById('movie-title').textContent = movie.movie_name;
          document.getElementById('movie-rating').textContent = movie.movie_rating;
          document.getElementById('movie-status').textContent = movie.status || 'Now Showing';
          document.getElementById('movie-duration').textContent = movie.duration || '2h 30m';
          document.getElementById('movie-language').textContent = movie.language;
          document.getElementById('movie-tagline').textContent = movie.description || 'Experience the magic of cinema on the big screen.';

          // Chips Logic (Genre + Language)
          const chipsContainer = document.getElementById('movie-chips');
          const genreChips = (movie.genre || '').split('/').map(g => `<span class="chip-item">${g.trim()}</span>`).join('');
          const langChips = (movie.language || '').split('/').map(l => `<span class="chip-item">${l.trim()}</span>`).join('');
          chipsContainer.innerHTML = genreChips + langChips;
          currentMovie = movie; // Save official movie object
        }
      } catch (e) { 
        console.warn("Meta loading failed, checking local fallbacks...", e); 
        const fallbackMovie = getFallbackMovies().find(m => m.movie_id === movieId);
        if (fallbackMovie) {
           // Re-apply binding for fallback only case
           const posterUrl = MoviePoster.get(fallbackMovie.movie_name);
           document.getElementById('movie-poster').src = posterUrl;
           document.getElementById('movie-poster').style.display = 'block';
           document.getElementById('hero-bg').style.backgroundImage = `url('${posterUrl}')`;
           document.getElementById('movie-title').textContent = fallbackMovie.movie_name;
           document.getElementById('movie-rating').textContent = fallbackMovie.rating || fallbackMovie.movie_rating;
           document.getElementById('movie-status').textContent = fallbackMovie.status || 'Now Showing';
           document.getElementById('movie-duration').textContent = fallbackMovie.duration || '2h 30m';
           document.getElementById('movie-language').textContent = fallbackMovie.language;
           document.getElementById('movie-tagline').textContent = fallbackMovie.description || '';
           const chipsContainer = document.getElementById('movie-chips');
           const genreChips = (fallbackMovie.genre || '').split('/').map(g => `<span class="chip-item">${g.trim()}</span>`).join('');
           const langChips = (fallbackMovie.language || '').split('/').map(l => `<span class="chip-item">${l.trim()}</span>`).join('');
           chipsContainer.innerHTML = genreChips + langChips;
           currentMovie = fallbackMovie;
        }
      }

      // 2. Fetch LIVE Shows & Group (Task 1, 3, 5)
      try {
        console.log("movieId:", movieId, "city:", selectedCity); // Task 2
        const res = await API.fetch(`/api/movies?action=shows&movieId=${movieId}&city=${selectedCity}`);
        
        if (res.shows && res.shows.length > 0) {
          const map = {};
          res.shows.forEach(s => {
            if (!map[s.theater_id]) {
              map[s.theater_id] = {
                id: s.theater_id,
                name: s.theater_name,
                location: s.location,
                shows: []
              };
            }
            
            // s.show_date is now "YYYY-MM-DD" string from TO_CHAR
            const sDate = s.show_date;
            const bookedCount = Array.isArray(s.selected_seats) ? s.selected_seats.length : 0;
            const available = (s.no_of_seats || 100) - bookedCount;

            map[s.theater_id].shows.push({
              id: s.screen_id,
              time: s.timmings,
              date: sDate,
              price: s.price || 150,
              format: s.screen_dimensions || "2D",
              available: available
            });
          });
          theatresData = Object.values(map);

          // Find nearest available date if current date is empty
          const currentShowsCount = theatresData.reduce((acc, t) => acc + t.shows.filter(s => s.date === selectedDate).length, 0);
          if (currentShowsCount === 0) {
            const allDates = res.shows.map(s => s.show_date ? s.show_date.split('T')[0] : '').filter(d => !!d);
            const sortedDates = [...new Set(allDates)].sort();
            const nearestDate = sortedDates.find(d => d >= selectedDate) || sortedDates[0];
            if (nearestDate && nearestDate !== selectedDate) {
              selectedDate = nearestDate;
              renderDates();
            }
          }
        } else {
          theatresData = []; // Trigger Task 4
        }
      } catch (err) {
        console.error("Booking API Critical Error:", err);
        UI.showMessage("Failed to load live shows. Using cache...");
        theatresData = []; 
      }

      // --- DEBUG MODE LOGGING ---
      console.log("=== MOVIE MAGIC DEBUG ===");
      console.log("Movie ID:", movieId);
      console.log("City:", selectedCity);
      console.log("Date Bar Selected:", selectedDate);
      console.log("Theatres Found (Count):", theatresData.length);
      console.log("Total Shows in API Response:", res.shows ? res.shows.length : 0);
      console.log("=========================");

      renderContent();
    }

    function setupFilters() {
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.onclick = () => {
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeFilter = chip.dataset.filter;
          console.log("Active Filter Changed:", activeFilter);
          renderContent();
        };
      });
    }

    function renderDates() {
      const container = document.getElementById('date-selector');
      const today = new Date();
      let html = '';
      
      for(let i=0; i<7; i++) {
        const d = new Date();
        d.setDate(today.getDate() + i);
        const day = d.toLocaleString('en-us', {weekday: 'short'});
        const date = d.getDate();
        const full = d.toISOString().split('T')[0];
        
        html += `
          <div class="date-item ${full === selectedDate ? 'active' : ''}" onclick="changeDate('${full}')">
            <span style="font-size: 0.7rem; text-transform: uppercase;">${day}</span>
            <span style="font-size: 1.2rem; font-weight: 800;">${date}</span>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    function changeDate(date) {
      selectedDate = date;
      console.log("Selected Date:", selectedDate);
      renderDates();
      renderContent();
    }

    function renderContent() {
      const container = document.getElementById('theater-list');
      console.log("Rendering Theatres for Filter:", activeFilter);

      const todayDate = new Date().toISOString().split('T')[0];
      const now = new Date();
      const currentFloat = now.getHours() + (now.getMinutes() / 60);

      function parseTime(tStr) {
        if (!tStr) return 0;
        let isPM = tStr.toLowerCase().includes('pm');
        let isAM = tStr.toLowerCase().includes('am');
        let clean = tStr.replace(/[a-zA-Z\s]/g, '').trim();
        let parts = clean.split(':');
        let h = parseInt(parts[0], 10) || 0;
        let m = parseInt(parts[1], 10) || 0;
        
        if (isPM && h !== 12) h += 12;
        if (isAM && h === 12) h = 0;
        
        return h + (m / 60);
      }

      // 2. Fix Filter Logic: Filter SHOWS chronologically and expiration
      const processedTheatres = theatresData.map(theater => {
        let filteredShows = theater.shows.filter(show => {
          // 1. Filter by Selected Date
          if (show.date !== selectedDate) return false;

          // 2. Filter by Search Chips
          if (activeFilter === 'price-low' && show.price > 200) return false;
          if (activeFilter === 'price-high' && show.price <= 200) return false;
          if (activeFilter === '3d' && show.format !== '3D') return false;
          if (activeFilter === '2d' && show.format !== '2D') return false;

          // 3. Chronological Expiration (Hide past shows for today)
          const tVal = parseTime(show.time);
          if (selectedDate === todayDate && tVal < currentFloat) {
            return false;
          }

          return true;
        });

        filteredShows.sort((a, b) => parseTime(a.time) - parseTime(b.time));

        return { ...theater, filteredShows };
      }).filter(t => t.filteredShows.length > 0);

      console.log("Theatres with Matching Shows:", processedTheatres);

      if (processedTheatres.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 4rem; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px dashed #333;">
            <p style="color: #666; font-size: 1.1rem;">No shows available for the selected criteria. 🍿</p>
            <button onclick="totalReset()" class="btn-primary" style="margin-top: 1.5rem; background: transparent; border: 1px solid #444;">Clear Filters</button>
          </div>
        `;
        return;
      }

      let html = '';
      processedTheatres.forEach(t => {
        html += `
          <div class="theater-card">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
              <div>
                <h3 style="font-size: 1.1rem; color: white;">${t.name}</h3>
                <p style="color: #555; font-size: 0.8rem; margin-top: 4px;">📍 ${t.location || "Hyderabad"}</p>
              </div>
              <span class="label-tag">Non-cancellable</span>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
              ${t.filteredShows.map(s => `
                <button class="show-time-btn" data-showid="${s.id}" data-movieid="${movieId}" data-theater="${t.name}" data-time="${s.time}">
                  ${s.time}
                  <small style="display: block; font-size: 0.6rem; opacity: 0.6; margin-top: 3px;">
                    ${s.format || '2D'} • ₹${s.price}
                  </small>
                  <span style="font-size: 0.55rem; color: ${s.available < 10 ? '#e50914' : '#28a745'}; font-weight: bold;">
                    ${s.available} seats left
                  </span>
                </button>
              `).join('')}
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function resetFilters() {
      activeFilter = 'all';
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      document.querySelector('[data-filter="all"]').classList.add('active');
      renderContent();
    }

    function totalReset() {
      localStorage.setItem('selectedCity', 'all');
      window.location.reload();
    }

    // Event Delegation for show timing buttons
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('.show-time-btn');
      if (!btn) return;
      
      e.preventDefault();
      e.stopPropagation();

      const showId = btn.dataset.showid;
      const mId = btn.dataset.movieid;
      const theaterName = btn.dataset.theater;
      const time = btn.dataset.time;

      if (!showId) {
        alert('Show ID missing');
        return;
      }
      
      console.log('Timing button clicked => showId:', showId, 'mId:', mId, 'time:', time);
      try {
        goToSeats(showId, theaterName, time, mId);
      } catch (err) {
        console.error("Navigation error:", err);
        alert("Could not load the seats page. Please try another timing.");
      }
    });

    function goToSeats(showId, theatreName, time, mId) {
      // Professional Datetime Sync (Safe for all browsers)
      // Convert "10:15 AM" to "10:15:00" for ISO compatibility
      let safeTime = time.trim();
      const match = safeTime.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (match) {
        let [_, hours, minutes, ampm] = match;
        hours = parseInt(hours);
        if (ampm.toUpperCase() === 'PM' && hours !== 12) hours += 12;
        if (ampm.toUpperCase() === 'AM' && hours === 12) hours = 0;
        safeTime = `${hours.toString().padStart(2, '0')}:${minutes}:00`;
      } else if (safeTime.includes(':') && safeTime.split(':').length === 2) {
        safeTime += ':00';
      }
      
      const datetime = `${selectedDate}T${safeTime}`;

      // Assign logical screen number
      const localMovieId = mId || movieId;
      const screenNo = localMovieId === 'M001' || localMovieId === 'M004' ? 1 : 2;
      const smartShowId = showId; // Use the provided screen_id

      const officialMovieId = currentMovie ? currentMovie.movie_id : localMovieId;

      localStorage.setItem('selectedBooking', JSON.stringify({
        movieId: officialMovieId,
        showId: smartShowId,
        theaterId: 1, // simplified
        theaterName: theatreName,
        screen: screenNo,
        date: selectedDate,
        time: time,
        seats: []
      }));

      // Legacy support
      localStorage.setItem('booking_context', JSON.stringify({
        showId: smartShowId, 
        theatreName,
        time,
        date: selectedDate,
        movieId: officialMovieId,
        datetime,
        screenNo
      }));

      console.log("Navigating to seats page with showId:", smartShowId, "movieId:", officialMovieId);
      window.location.href = `/seats.html?showId=${encodeURIComponent(smartShowId)}&movieId=${encodeURIComponent(officialMovieId)}&datetime=${encodeURIComponent(datetime)}`;
    }

    // Initial Execution
    init();
  </script>
</body>
</html>
