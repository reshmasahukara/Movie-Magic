<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Tickets | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="/" class="logo">MOVIE MAGIC</a>
    <div class="links">
      <a href="/">Home</a>
      <a href="/dashboard.html">Dashboard</a>
    </div>
  </nav>

  <main class="container">
    <div id="booking-flow">
      <!-- Step 1: Selection -->
      <section id="selection-step">
        <h2 style="margin-bottom: 2rem;">Select Theater & Show</h2>
        <div id="theater-list">
          <p>Loading theaters...</p>
        </div>
      </section>

      <!-- Step 2: Seats -->
      <section id="seats-step" style="display: none;">
        <button onclick="showStep('selection-step')" class="btn-primary" style="margin-bottom: 2rem; background: #333;">← Back to Theaters</button>
        <h2 id="selected-show-title">Select Your Seats</h2>
        <div class="seats-container" id="seats-grid"></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; background: var(--card-bg); padding: 2rem; border-radius: 12px;">
          <div>
            <p style="color: var(--text-muted)">Selected Seats: <span id="selected-list" style="color: white; font-weight: bold;">None</span></p>
            <p style="font-size: 1.5rem; font-weight: bold; margin-top: 0.5rem;">Total: ₹<span id="total-price">0</span></p>
          </div>
          <button class="btn-primary" onclick="confirmBooking()">Confirm Booking</button>
        </div>
      </section>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('movieId');
    let currentShow = null;
    let selectedSeats = [];
    const SEAT_PRICE = 250;

    async function init() {
      if (!movieId) {
        window.location.href = '/';
        return;
      }
      loadTheaterInfo();
    }

    async function loadTheaterInfo() {
      try {
        const { theaters, shows } = await API.fetch('/api/movies', {
          method: 'POST',
          body: JSON.stringify({ movieId })
        });
        
        const list = document.getElementById('theater-list');
        if (theaters.length === 0) {
          list.innerHTML = '<p>No shows available for this movie right now.</p>';
          return;
        }

        list.innerHTML = theaters.map(t => {
          const tShows = shows.filter(s => s.theater_id === t.theater_id);
          return `
            <div class="movie-card" style="padding: 2rem; margin-bottom: 1.5rem;">
              <h3>${t.theater_name}</h3>
              <p style="color: var(--text-muted); margin-bottom: 1rem;">${t.city}</p>
              <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                ${tShows.map(s => `
                  <button class="btn-primary" style="background: #2A2A2A;" onclick="selectShow('${encodeURIComponent(JSON.stringify(s))}', '${t.theater_name}')">
                    ${s.timmings} - ${s.show_date}
                  </button>
                `).join('')}
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        UI.showMessage(err.message);
      }
    }

    function selectShow(sJson, theaterName) {
      currentShow = JSON.parse(decodeURIComponent(sJson));
      document.getElementById('selected-show-title').textContent = `${theaterName} | ${currentShow.timmings}`;
      loadSeats();
      showStep('seats-step');
    }

    function showStep(stepId) {
      document.getElementById('selection-step').style.display = stepId === 'selection-step' ? 'block' : 'none';
      document.getElementById('seats-step').style.display = stepId === 'seats-step' ? 'block' : 'none';
    }

    function loadSeats() {
      const grid = document.getElementById('seats-grid');
      const occupied = currentShow.selected_seats || [];
      grid.innerHTML = '';
      selectedSeats = [];
      updateSummary();

      for (let i = 1; i <= currentShow.no_of_seats; i++) {
        const seat = document.createElement('div');
        const seatId = `S${i}`;
        seat.className = `seat ${occupied.includes(seatId) ? 'occupied' : ''}`;
        seat.onclick = () => toggleSeat(seat, seatId);
        grid.appendChild(seat);
      }
    }

    function toggleSeat(el, id) {
      if (el.classList.contains('occupied')) return;
      el.classList.toggle('selected');
      if (selectedSeats.includes(id)) {
        selectedSeats = selectedSeats.filter(s => s !== id);
      } else {
        selectedSeats.push(id);
      }
      updateSummary();
    }

    function updateSummary() {
      document.getElementById('selected-list').textContent = selectedSeats.join(', ') || 'None';
      document.getElementById('total-price').textContent = selectedSeats.length * SEAT_PRICE;
    }

    async function confirmBooking() {
      if (selectedSeats.length === 0) {
        UI.showMessage('Please select at least one seat');
        return;
      }

      try {
        const user = API.getSession();
        await API.fetch('/api/booking?action=book', {
          method: 'POST',
          body: JSON.stringify({
            screenid: currentShow.screen_id,
            user_id: user.user_id,
            noofseats: selectedSeats.length,
            seats: selectedSeats,
            price: selectedSeats.length * SEAT_PRICE
          })
        });
        UI.showMessage('Booking confirmed!', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 1500);
      } catch (err) {
        UI.showMessage(err.message);
      }
    }

    init();
  </script>
</body>
</html>
