<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theaters Selection | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .show-header { background: #1F1F1F; padding: 2.5rem 0; border-bottom: 1px solid #333; }
    .date-bar { 
      display: flex; 
      gap: 15px; 
      overflow-x: auto; 
      padding: 1.5rem 0; 
      scrollbar-width: none; 
      border-bottom: 1px solid #333;
    }
    .date-bar::-webkit-scrollbar { display: none; }
    .date-item { 
      min-width: 60px; 
      height: 75px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      border-radius: 8px; 
      cursor: pointer; 
      transition: all 0.3s;
      border: 1px solid transparent;
      color: #777;
    }
    .date-item.active { background: var(--primary); color: white; transform: scale(1.05); }
    .date-item:hover:not(.active) { border-color: var(--primary); color: #ccc; }

    .filters-bar { display: flex; gap: 1rem; padding: 1.5rem 0; flex-wrap: wrap; }
    .filter-chip { 
      padding: 6px 16px; 
      border: 1px solid #444; 
      border-radius: 20px; 
      font-size: 0.85rem; 
      cursor: pointer; 
      transition: 0.3s;
      color: #999;
    }
    .filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; }

    .theater-card { 
      background: var(--card-bg); 
      border: 1px solid var(--glass); 
      border-radius: 12px; 
      padding: 1.5rem; 
      margin-bottom: 1.5rem; 
    }
    .timing-btn { 
      padding: 8px 18px; 
      border: 1px solid #28a745; 
      border-radius: 4px; 
      background: transparent; 
      color: #28a745; 
      font-weight: 500; 
      cursor: pointer; 
      transition: 0.3s;
      font-size: 0.8rem;
      text-align: center;
    }
    .timing-btn:hover { background: #28a745; color: white; }
    
    .label-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #333; color: #666; margin-left: 10px; text-transform: uppercase; }
  </style>
</head>
<body>
  <nav></nav>

  <header class="show-header">
    <div class="container">
      <h1 id="movie-title" style="font-size: 2.2rem; margin-bottom: 0.5rem; font-weight: 800;">Movie Title</h1>
      <p id="movie-meta" style="color: var(--text-muted); font-weight: 500;">UA • Action • 2h 45m</p>
    </div>
  </header>

  <main class="container">
    <!-- Date Selector -->
    <div class="date-bar" id="date-selector"></div>

    <!-- Filters -->
    <div class="filters-bar" id="filters-container">
      <button class="filter-chip active" data-filter="all">All Shows</button>
      <button class="filter-chip" data-filter="price-low">₹0 - ₹200</button>
      <button class="filter-chip" data-filter="price-high">₹201+</button>
      <button class="filter-chip" data-filter="3d">3D Only</button>
      <button class="filter-chip" data-filter="2d">2D Only</button>
    </div>

    <!-- Theater List -->
    <div id="theater-list" style="margin-top: 2rem;">
      <!-- Content injected by JS -->
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('movieId');
    let selectedDate = new Date().toISOString().split('T')[0];
    let activeFilter = 'all';

    // 1. Professional Static Data Format (Fallback & Default)
    const theatresData = [
      {
        id: 1,
        name: "Cinepolis: Nexus",
        location: "Hyderabad",
        shows: [
          { id: 101, time: "10:15 AM", price: 150, format: "2D" },
          { id: 102, time: "06:05 PM", price: 250, format: "3D" }
        ]
      },
      {
        id: 2,
        name: "INOX: DN Regalia Mall",
        location: "Hyderabad",
        shows: [
          { id: 201, time: "10:45 AM", price: 200, format: "2D" },
          { id: 202, time: "07:40 PM", price: 300, format: "3D" }
        ]
      },
      {
        id: 3,
        name: "INOX: Symphony Mall",
        location: "Hyderabad",
        shows: [
          { id: 301, time: "04:00 PM", price: 180, format: "2D" }
        ]
      },
      {
        id: 4,
        name: "PVR: Utkal Kanika Galleria",
        location: "Hyderabad",
        shows: [
          { id: 401, time: "01:15 PM", price: 220, format: "2D" }
        ]
      },
      {
        id: 5,
        name: "PJ Movies (Veena Theatre)",
        location: "Hyderabad",
        shows: [
          { id: 501, time: "06:00 PM", price: 120, format: "2D" }
        ]
      }
    ];

    async function init() {
      // Basic Auth Check
      if (!API.getSession()) {
        window.location.href = "/login.html";
        return;
      }

      renderDates();
      setupFilters();
      
      // Update Movie Header (Try to get from API if available)
      try {
        const { movies } = await API.fetch('/api/movies');
        const movie = movies.find(m => m.movie_id === movieId);
        if(movie) {
          document.getElementById('movie-title').textContent = movie.movie_name;
          document.getElementById('movie-meta').textContent = `${movie.movie_rating} • ${movie.genre} • ${movie.language} • 2h 30m`;
        }
      } catch (e) {
        console.warn("API meta fetch failed, using fallbacks.");
      }

      renderContent();
    }

    function setupFilters() {
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.onclick = () => {
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeFilter = chip.dataset.filter;
          console.log("Active Filter Changed:", activeFilter);
          renderContent();
        };
      });
    }

    function renderDates() {
      const container = document.getElementById('date-selector');
      const today = new Date();
      let html = '';
      
      for(let i=0; i<7; i++) {
        const d = new Date();
        d.setDate(today.getDate() + i);
        const day = d.toLocaleString('en-us', {weekday: 'short'});
        const date = d.getDate();
        const full = d.toISOString().split('T')[0];
        
        html += `
          <div class="date-item ${full === selectedDate ? 'active' : ''}" onclick="changeDate('${full}')">
            <span style="font-size: 0.7rem; text-transform: uppercase;">${day}</span>
            <span style="font-size: 1.2rem; font-weight: 800;">${date}</span>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    function changeDate(date) {
      selectedDate = date;
      console.log("Selected Date:", selectedDate);
      renderDates();
      renderContent();
    }

    function renderContent() {
      const container = document.getElementById('theater-list');
      console.log("Rendering Theatres for Filter:", activeFilter);

      // 2. Fix Filter Logic: Filter SHOWS, not entire theatres
      const processedTheatres = theatresData.map(theater => {
        const filteredShows = theater.shows.filter(show => {
          if (activeFilter === 'all') return true;
          if (activeFilter === 'price-low') return show.price <= 200;
          if (activeFilter === 'price-high') return show.price > 200;
          if (activeFilter === '3d') return show.format === '3D';
          if (activeFilter === '2d') return show.format === '2D';
          return true;
        });
        return { ...theater, filteredShows };
      }).filter(t => t.filteredShows.length > 0);

      console.log("Theatres with Matching Shows:", processedTheatres);

      if (processedTheatres.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 4rem; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px dashed #333;">
            <p style="color: #666; font-size: 1.1rem;">No shows available for the selected criteria. 🍿</p>
            <button onclick="resetFilters()" class="btn-primary" style="margin-top: 1.5rem; background: transparent; border: 1px solid #444;">Clear Filters</button>
          </div>
        `;
        return;
      }

      let html = '';
      processedTheatres.forEach(t => {
        html += `
          <div class="theater-card">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
              <div>
                <h3 style="font-size: 1.1rem; color: white;">${t.name}</h3>
                <p style="color: #555; font-size: 0.8rem; margin-top: 4px;">📍 ${t.location || "Hyderabad"}</p>
              </div>
              <span class="label-tag">Non-cancellable</span>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
              ${t.filteredShows.map(s => `
                <button class="timing-btn" onclick="goToSeats('${s.id}', '${t.name}', '${s.time}')">
                  ${s.time}
                  <span style="display: block; font-size: 0.6rem; opacity: 0.6; margin-top: 3px;">${s.format} • ₹${s.price}</span>
                </button>
              `).join('')}
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function resetFilters() {
      activeFilter = 'all';
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      document.querySelector('[data-filter="all"]').classList.add('active');
      renderContent();
    }

    function goToSeats(showId, theatreName, time) {
      // Professional Datetime Sync
      const dateObj = new Date(`${selectedDate} ${time}`);
      const datetime = dateObj.toISOString();

      // PART 1: Generate UNIQUE Show ID (Theater-Movie-Date-Time)
      // This prevents global seat conflicts between different movies
      const timeClean = time.replace(/[:\s]/g, '');
      const smartShowId = `${theatreName.substring(0,3).toUpperCase()}-${movieId}-${selectedDate}-${timeClean}`;

      localStorage.setItem('booking_context', JSON.stringify({
        showId: smartShowId, // Use unique smart ID
        theatreName,
        time,
        date: selectedDate,
        movieId,
        datetime
      }));
      window.location.href = `/seats.html?showId=${smartShowId}&movieId=${movieId}&datetime=${datetime}`;
    }

    // Initial Execution
    init();
  </script>
</body>
</html>
