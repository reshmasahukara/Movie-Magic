<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events Listing | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--bg-dark);">
  <nav id="navbar-container"></nav>

  <main class="container">
    <div class="listing-container">
      <!-- Sidebar Filters -->
      <aside class="filter-sidebar">
        <div class="filter-section">
          <h3>Categories</h3>
          <div class="filter-options">
            <label class="filter-label"><input type="checkbox" class="filter-checkbox cat-cb" value="Music" onchange="applyFilters()"> Music</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox cat-cb" value="Comedy" onchange="applyFilters()"> Comedy</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox cat-cb" value="Sports" onchange="applyFilters()"> Sports</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox cat-cb" value="Outdoor" onchange="applyFilters()"> Outdoor</label>
          </div>
        </div>

        <div class="filter-section">
          <h3>Price Range</h3>
          <div class="filter-options">
            <label class="filter-label"><input type="checkbox" class="filter-checkbox price-cb" value="0" onchange="applyFilters()"> Free</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox price-cb" value="500" onchange="applyFilters()"> 0 - 500</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox price-cb" value="1000" onchange="applyFilters()"> 501 - 1000</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox price-cb" value="5000" onchange="applyFilters()"> Above 1000</label>
          </div>
        </div>

        <button class="btn-clear-all" onclick="clearFilters()">Clear All Filters</button>
      </aside>

      <!-- Content Area -->
      <section class="listing-content">
        <div class="listing-header">
          <h1>Events in <span id="city-name" style="color:var(--primary)">All Cities</span></h1>
          <p class="subheading">Discover live entertainment near you</p>
          
          <div class="chips-wrapper" id="category-chips">
            <div class="filter-chip active" onclick="setChipFilter('all', this)">All Categories</div>
            <div class="filter-chip" onclick="setChipFilter('Music', this)">Music</div>
            <div class="filter-chip" onclick="setChipFilter('Comedy', this)">Comedy</div>
            <div class="filter-chip" onclick="setChipFilter('Sports', this)">Sports</div>
            <div class="filter-chip" onclick="setChipFilter('Workshops', this)">Workshops</div>
          </div>
        </div>

        <div id="events-grid" class="listing-grid">
           <!-- Dynamically Loaded Events -->
        </div>
      </section>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    let activeChip = 'all';
    const selectedCity = localStorage.getItem('selectedCity') || 'All Cities';

    async function loadEventsListing() {
      const grid = document.getElementById('events-grid');
      const titleCity = document.getElementById('city-name');
      if (titleCity) titleCity.textContent = selectedCity !== 'All Cities' ? selectedCity : 'Selected Cities';

      const catFilters = Array.from(document.querySelectorAll('.cat-cb:checked')).map(cb => cb.value);
      const priceFilters = Array.from(document.querySelectorAll('.price-cb:checked')).map(cb => cb.value);

      try {
        let url = `/api/events?action=list&city=all&category=all`;
        if (activeChip !== 'all') url = `/api/events?action=list&city=all&category=${activeChip}`;
        
        const { events } = await API.fetch(url);
        let filtered = events || [];

        if (catFilters.length > 0) {
           filtered = filtered.filter(ev => catFilters.includes(ev.category));
        }

        if (priceFilters.length > 0) {
           filtered = filtered.filter(ev => {
             const p = parseFloat(ev.price);
             if (priceFilters.includes('0') && p === 0) return true;
             if (priceFilters.includes('500') && p > 0 && p <= 500) return true;
             if (priceFilters.includes('1000') && p > 500 && p <= 1000) return true;
             if (priceFilters.includes('5000') && p > 1000) return true;
             return false;
           });
        }

        if (filtered.length === 0) {
          grid.innerHTML = `<div style="grid-column: 1/-1; padding: 5rem; text-align: center; color: var(--text-muted); font-size: 1.2rem;">No matching events found. 🎫</div>`;
          return;
        }

        grid.innerHTML = filtered.map(ev => {
          const date = new Date(ev.event_date).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
          return `
            <div class="premium-card" onclick="window.location.href='/event-booking.html?id=${ev.id}'">
              <div class="card-poster-wrapper">
                <img src="${ev.image_url}" alt="${ev.event_name}" class="card-poster">
              </div>
              <div class="card-content">
                <span style="color:var(--primary); font-size:0.75rem; font-weight:800; text-transform:uppercase;">${ev.category}</span>
                <h3 style="margin-top:4px;">${ev.event_name}</h3>
                <div class="meta">📅 ${date} • ${ev.event_time || ''}</div>
                <div class="meta">📍 ${ev.venue}, ${ev.city}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                  <span style="font-weight:700;">₹${ev.price}</span>
                  <a href="/event-booking.html?id=${ev.id}" class="btn-book" style="padding: 10px 20px; font-size:0.85rem; font-weight:800;" onclick="event.stopPropagation()">BOOK NOW</a>
                </div>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        console.error('Events Listing Error:', err);
        grid.innerHTML = `<div style="grid-column: 1/-1; padding: 5rem; text-align: center; color: var(--primary);">Failed to load events.</div>`;
      }
    }

    window.applyFilters = () => loadEventsListing();

    window.setChipFilter = (cat, el) => {
      activeChip = cat;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      loadEventsListing();
    };

    window.clearFilters = () => {
      document.querySelectorAll('.filter-checkbox').forEach(cb => cb.checked = false);
      activeChip = 'all';
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      document.querySelector('.filter-chip[onclick*="all"]').classList.add('active');
      loadEventsListing();
    };

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(loadEventsListing, 100);
    });
  </script>
</body>
</html>
