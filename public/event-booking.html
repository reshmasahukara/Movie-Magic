<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Event Tickets | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .booking-layout { display: grid; grid-template-columns: 1fr 380px; gap: 2.5rem; margin-top: 2rem; }
    
    /* Premium Hero Styles */
    .event-details-hero { 
      background: var(--card-bg); 
      border-radius: 16px; 
      overflow: hidden; 
      border: 1px solid var(--glass);
      position: relative;
    }
    
    .hero-banner-container {
      position: relative;
      width: 100%;
      height: 440px;
      overflow: hidden;
    }
    
    .event-banner { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      object-position: center;
      transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: block;
    }
    
    .hero-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 40%, transparent 100%);
      pointer-events: none;
      z-index: 1;
    }
    
    .hero-content-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 3rem 2.5rem;
      z-index: 2;
    }

    .hero-banner-container:hover .event-banner {
      transform: scale(1.03);
    }
    
    .event-info-pane { padding: 2.5rem; background: var(--card-bg); }
    
    @media (max-width: 768px) {
      .booking-layout { grid-template-columns: 1fr; }
      .hero-banner-container { height: 240px; }
      .hero-content-overlay { padding: 1.5rem; }
      #event-name { font-size: 1.8rem !important; }
    }
    
    /* Existing Seat/Qty Styles... */
    
    .seat-grid-container { background: #111; padding: 2rem; border-radius: 12px; margin-top: 1.5rem; text-align: center; }
    .seat-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; justify-content: center; margin: 2rem auto; max-width: 500px; }
    .seat { width: 35px; height: 35px; background: #333; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; transition: all 0.3s; }
    .seat.selected { background: var(--primary); color: white; transform: scale(1.1); box-shadow: 0 0 10px var(--primary); }
    .seat.booked { background: #1a1a1a; cursor: not-allowed; opacity: 0.3; color: transparent; }
    .seat:hover:not(.booked) { border: 1px solid var(--primary); }

    .qty-selector { display: flex; align-items: center; gap: 1.5rem; justify-content: center; padding: 2rem; background: #111; border-radius: 12px; }
    .qty-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--primary); background: transparent; color: white; cursor: pointer; font-size: 1.2rem; }
    
    .summary-card { background: var(--card-bg); border-radius: 12px; padding: 2rem; border: 1px solid var(--glass); height: fit-content; position: sticky; top: 2rem; }
    .screen-indicator { width: 80%; height: 4px; background: var(--primary); margin: 0 auto 2rem; border-radius: 2px; box-shadow: 0 4px 10px var(--primary); }
  </style>
</head>
<body>
  <nav id="nav-placeholder"></nav>

  <main class="container">
    <div id="event-loading" style="text-align: center; padding: 5rem;">
       <h2 style="color: var(--primary);">Loading Event Details...</h2>
    </div>

    <div id="booking-content" class="booking-layout" style="display: none;">
      <!-- Left: Event & Selection -->
      <section>
        <div class="event-details-hero">
          <div class="hero-banner-container">
            <img id="event-banner" src="" class="event-banner" loading="lazy">
            <div class="hero-overlay"></div>
            <div class="hero-content-overlay">
              <span id="event-category" class="event-tag" style="margin-bottom: 0.8rem; background: var(--primary); color: white; border: none;"></span>
              <h1 id="event-name" style="font-size: 3rem; margin-bottom: 0.5rem; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.5);"></h1>
              <p id="event-meta-top" style="color: #eee; font-size: 1.1rem; opacity: 0.9;"></p>
            </div>
          </div>
          <div class="event-info-pane">
            <h3 style="color: var(--primary); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 1rem;">About the Event</h3>
            <p id="event-description" style="line-height: 1.8; color: #ccc; font-size: 1.05rem;"></p>
            <div id="event-meta-bottom" style="margin-top: 2rem; padding-top: 2rem; border-top: 1px dashed #333; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
              <!-- Meta items injected here -->
            </div>
          </div>
        </div>

        <!-- Hybrid UI -->
        <div id="selection-area">
          <div id="grid-ui" style="display: none;">
            <div class="seat-grid-container">
              <h3>SELECT YOUR SEATS</h3>
              <div class="screen-indicator"></div>
              <div id="seats-container" class="seat-grid"></div>
              <div style="display: flex; justify-content: center; gap: 20px; font-size: 0.8rem; color: #888;">
                <div style="display:flex; align-items:center; gap:5px;"><div class="seat" style="width:15px; height:15px; cursor:default;"></div> Available</div>
                <div style="display:flex; align-items:center; gap:5px;"><div class="seat selected" style="width:15px; height:15px; cursor:default;"></div> Selected</div>
                <div style="display:flex; align-items:center; gap:5px;"><div class="seat booked" style="width:15px; height:15px; cursor:default;"></div> Occupied</div>
              </div>
            </div>
          </div>

          <div id="qty-ui" style="display: none;">
            <div style="text-align: center; margin-top: 2rem;">
              <h3>SELECT QUANTITY</h3>
              <div class="qty-selector">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <span id="qty-display" style="font-size: 2.5rem; font-weight: 800; min-width: 60px;">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
              </div>
              <p style="color: #666; margin-top: 10px;">Max 10 tickets per booking</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Right: Summary & Checkout -->
      <aside>
        <div class="summary-card">
          <h3 style="border-bottom: 1px solid var(--glass); padding-bottom: 1rem; margin-bottom: 1.5rem;">Order Summary</h3>
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
             <span id="summary-label">Tickets (×1)</span>
             <span id="summary-price">₹0</span>
          </div>
          <div id="selected-seats-row" style="display: none; justify-content: space-between; margin-bottom: 1rem; color: var(--primary);">
             <span>Seats</span>
             <span id="summary-seats">-</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px dashed #444; font-weight: 800; font-size: 1.2rem;">
             <span>Total Amount</span>
             <span id="total-price" style="color: var(--primary);">₹0</span>
          </div>
          
          <button id="proceed-btn" class="btn-primary" style="width: 100%; margin-top: 2rem; padding: 15px;" onclick="proceedToPayment()">PROCEED TO PAY</button>
          
          <p style="font-size: 0.75rem; color: #555; text-align: center; margin-top: 1.5rem;">By clicking Proceed, you agree to our Terms & Conditions.</p>
        </div>
      </aside>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    let currentEvent = null;
    let selectedSeats = [];
    let ticketQty = 1;

    // Redundant Image System
    function getCategoryFallback(cat) {
      const fallbacks = {
        'Music': 'https://images.unsplash.com/photo-1514525253361-bee048425260?auto=format&fit=crop&w=1200',
        'Sports': 'https://images.unsplash.com/photo-1461896756913-647ee9910c2b?auto=format&fit=crop&w=1200',
        'Comedy': 'https://images.unsplash.com/photo-1527224857813-f8e1374528ca?auto=format&fit=crop&w=1200',
        'Festival': 'https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?auto=format&fit=crop&w=1200',
        'Outdoor': 'https://images.unsplash.com/photo-1544551763-8a405c1d8569?auto=format&fit=crop&w=1200',
        'Workshops': 'https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=1200'
      };
      return fallbacks[cat] || 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1200';
    }

    function getEventImage(ev) {
      if (!ev) return '';
      return ev.image_url || ev.image || ev.poster || ev.banner_url || getCategoryFallback(ev.category);
    }

    window.handleImageError = function(el) {
      if (!currentEvent) return;
      const fallback = getCategoryFallback(currentEvent.category);
      if (el.src !== fallback) {
        console.warn(`[Image System] Primary image failed for ${currentEvent.event_name}. Falling back to ${currentEvent.category} library.`);
        el.src = fallback;
      }
    };

    function getFallbackEvents() {
      return [
        { id: 101, event_name: 'Sunburn Home Festival', category: 'Music', city: 'Goa', venue: 'Beachside', event_date: '2026-12-28', image_url: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=400', price: 5000 },
        { id: 102, event_name: 'EDM Pulse 2026', category: 'Music', city: 'Mumbai', venue: 'Jio Gardens', event_date: '2026-05-15', image_url: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=400', price: 2999 },
        { id: 103, event_name: 'Lollapalooza India', category: 'Music', city: 'Mumbai', venue: 'Mahalaxmi Race Course', event_date: '2026-01-28', image_url: 'https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?auto=format&fit=crop&w=400', price: 8999 },
        { id: 201, event_name: 'MI vs CSK', category: 'Sports', city: 'Mumbai', venue: 'Wankhede Stadium', event_date: '2026-05-16', image_url: 'https://i.pinimg.com/videos/thumbnails/originals/a0/8f/e0/a08fe047f55493fbca44602ddc5cee5e.0000000.jpg', price: 999 },
        { id: 202, event_name: 'RCB vs KKR', category: 'Sports', city: 'Bengaluru', venue: 'Chinnaswamy Stadium', event_date: '2026-05-20', image_url: 'https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&w=400', price: 1200 },
        { id: 203, event_name: 'Wankhede Stadium Tour', category: 'Sports', city: 'Mumbai', venue: 'Wankhede', event_date: '2026-05-22', image_url: 'https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=400', price: 499 },
        { id: 301, event_name: 'Zakir Khan Live', category: 'Comedy', city: 'Mumbai', venue: 'Shanmukhananda Hall', event_date: '2026-05-20', image_url: 'https://m.media-amazon.com/images/I/71R3yX-S1JL._RI_.jpg', price: 1200 },
        { id: 302, event_name: 'Chalta Hai Comedy', category: 'Comedy', city: 'Hyderabad', venue: 'Shilpakala Vedika', event_date: '2026-05-29', image_url: 'https://m.media-amazon.com/images/I/71MTDZktU9L.jpg', price: 499 },
        { id: 303, event_name: 'Comicstaan Premiere', category: 'Comedy', city: 'Delhi', venue: 'Talkatora Stadium', event_date: '2026-06-05', image_url: 'https://images.unsplash.com/photo-1527224857813-f8e1374528ca?auto=format&fit=crop&w=400', price: 799 },
        { id: 401, event_name: 'Wonderla Adventure', category: 'Outdoor', city: 'Bengaluru', venue: 'Wonderla', event_date: '2026-05-24', image_url: 'https://i.pinimg.com/originals/be/53/74/be53745621b23ab86399d7c0d8b03aaf.jpg', price: 1499 },
        { id: 402, event_name: 'Riverside Trekking', category: 'Outdoor', city: 'Pune', venue: 'Mulshi Lake', event_date: '2026-05-30', image_url: 'https://images.unsplash.com/photo-1551632811-561732d1e306?auto=format&fit=crop&w=400', price: 899 },
        { id: 403, event_name: 'Stargazing Night', category: 'Outdoor', city: 'Mumbai', venue: 'Lonavala', event_date: '2026-06-02', image_url: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=400', price: 1999 },
        { id: 501, event_name: 'Pottery Workshop', category: 'Workshops', city: 'Mumbai', venue: 'The Art Studio', event_date: '2026-05-18', image_url: 'https://images.unsplash.com/photo-1565191999001-551c187427bb?auto=format&fit=crop&w=400', price: 1500 },
        { id: 502, event_name: 'Photography Class', category: 'Workshops', city: 'Delhi', venue: 'Lodhi Gardens', event_date: '2026-06-10', image_url: 'https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&w=400', price: 2500 },
        { id: 503, event_name: 'AI Bootcamp', category: 'Workshops', city: 'Bengaluru', venue: 'NextGen Labs', event_date: '2026-06-15', image_url: 'https://images.unsplash.com/photo-1591453089816-0fbb971b454c?auto=format&fit=crop&w=400', price: 4999 }
      ];
    }

    async function loadEvent() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      if (!id) return UI.showMessage('Invalid Event ID');

      try {
        const { event } = await API.fetch(`/api/events?action=details&id=${id}`);
        
        if (event) {
          currentEvent = event;
        } else {
          // Fallback to local data
          const fallback = getFallbackEvents().find(fb => String(fb.id) === String(id));
          if (fallback) {
            currentEvent = fallback;
          } else {
            throw new Error('Event not found in live or fallback storage.');
          }
        }
        
        renderEventDetails();
        setupBookingUI();
      } catch (err) {
        console.error('Event Load Error:', err);
        UI.showMessage('Event Unavailable at this time. 🎟️');
      }
    }

    function renderEventDetails() {
      document.getElementById('event-loading').style.display = 'none';
      document.getElementById('booking-content').style.display = 'grid';
      
      const banner = document.getElementById('event-banner');
      banner.onerror = function() { window.handleImageError(this); };
      banner.src = getEventImage(currentEvent);
      
      document.getElementById('event-name').textContent = currentEvent.event_name;
      document.getElementById('event-category').textContent = currentEvent.category;
      
      const dateStr = new Date(currentEvent.event_date).toLocaleDateString(undefined, { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      
      document.getElementById('event-meta-top').innerHTML = `📅 ${dateStr} at ${currentEvent.event_time}`;
      document.getElementById('event-meta-bottom').innerHTML = `
        <div>
          <span style="display:block; color: #666; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px;">VENUE</span>
          <span style="font-weight: 700;">${currentEvent.venue}</span>
        </div>
        <div>
          <span style="display:block; color: #666; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px;">CITY</span>
          <span style="font-weight: 700;">${currentEvent.city}</span>
        </div>
        <div>
          <span style="display:block; color: #666; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px;">PRICE</span>
          <span style="font-weight: 700; color: var(--primary);">₹${currentEvent.price} onwards</span>
        </div>
      `;
      document.getElementById('event-description').textContent = currentEvent.description || "No description available for this event.";
      
      updateSummary();
    }

    function setupBookingUI() {
      if (currentEvent.has_seat_map) {
        document.getElementById('grid-ui').style.display = 'block';
        document.getElementById('selected-seats-row').style.display = 'flex';
        renderGrid();
      } else {
        document.getElementById('qty-ui').style.display = 'block';
      }
    }

    function renderGrid() {
      const container = document.getElementById('seats-container');
      const booked = currentEvent.booked_seats || [];
      const total = currentEvent.total_seats || 100;

      let html = '';
      for (let i = 1; i <= total; i++) {
        const seatId = 'S' + i;
        const isBooked = booked.includes(seatId);
        html += `<div class="seat ${isBooked ? 'booked' : ''}" onclick="toggleSeat('${seatId}', this)">${i}</div>`;
      }
      container.innerHTML = html;
    }

    function toggleSeat(id, el) {
      if (el.classList.contains('booked')) return;
      
      if (selectedSeats.includes(id)) {
        selectedSeats = selectedSeats.filter(s => s !== id);
        el.classList.remove('selected');
      } else {
        if (selectedSeats.length >= 10) return UI.showMessage('Max 10 tickets allowed');
        selectedSeats.push(id);
        el.classList.add('selected');
      }
      updateSummary();
    }

    function changeQty(delta) {
      const newQty = ticketQty + delta;
      if (newQty < 1 || newQty > 10) return;
      ticketQty = newQty;
      document.getElementById('qty-display').textContent = ticketQty;
      updateSummary();
    }

    function updateSummary() {
      const count = currentEvent.has_seat_map ? selectedSeats.length : ticketQty;
      const total = count * currentEvent.price;
      
      document.getElementById('summary-label').textContent = `Tickets (×${count})`;
      document.getElementById('summary-price').textContent = `₹${total}`;
      document.getElementById('total-price').textContent = `₹${total}`;
      
      if (currentEvent.has_seat_map) {
        document.getElementById('summary-seats').textContent = selectedSeats.length > 0 ? selectedSeats.join(', ') : '-';
      }
    }

    async function proceedToPayment() {
      const user = API.getUser();
      if (!user) {
        UI.showMessage('Please login to book tickets');
        setTimeout(() => window.location.href = '/login.html', 1500);
        return;
      }

      const count = currentEvent.has_seat_map ? selectedSeats.length : ticketQty;
      if (count === 0) return UI.showMessage('Please select at least one ticket');

      const btn = document.getElementById('proceed-btn');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        const payload = {
          event_id: currentEvent.id,
          user_id: user.user_id,
          user_name: user.name,
          email: user.email,
          phone: user.contact_no || 'Not Set',
          tickets_count: count,
          selected_seats: selectedSeats,
          amount: count * currentEvent.price
        };

        const res = await API.fetch('/api/events?action=book', {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        if (res.success) {
           UI.showMessage('Booking Successful! Redirecting to your ticket...', 'success');
           setTimeout(() => window.location.href = '/history.html', 2000);
        }
      } catch (err) {
        UI.showMessage(err.message);
        btn.disabled = false;
        btn.textContent = 'PROCEED TO PAY';
      }
    }

    UI.initNavbar();
    loadEvent();
  </script>
</body>
</html>
