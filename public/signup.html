<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1920&q=80'); background-size: cover;">
  <nav>
    <a href="/" class="logo"><i>🎬</i> MOVIE MAGIC</a>
    <div class="links">
      <a href="/">Home</a>
      <a href="/login.html">Login</a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-container" style="max-width: 500px;">
      <h2 style="font-size: 2rem; margin-bottom: 2rem; text-align: center;">Create Account</h2>
      <form id="signup-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="username" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="Min. 8 characters">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label>City</label>
            <input type="text" id="city" required placeholder="City">
          </div>
          <div class="form-group">
            <label>Contact No</label>
            <input type="tel" id="contactno" required placeholder="Phone">
          </div>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
      </form>
      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="/login.html" style="color: var(--primary); text-decoration: none;">Sign in</a>
      </p>
    </div>
  </div>

  <!-- OTP Modal -->
  <div class="modal-overlay" id="otpModal" style="display:none; opacity:0; pointer-events:none; transition: opacity 0.3s; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10000; align-items:center; justify-content:center;">
    <div class="modal-content" style="max-width: 400px; padding: 2.5rem; background:#111; border:1px solid #333; border-radius:15px; text-align:center;">
      <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem; color: white;">Email Verification</h2>
      <p style="color: #888; font-size: 0.9rem; margin-bottom: 2rem;">We've sent a 6-digit code to <span id="display-email" style="color: var(--primary);"></span></p>
      
      <div class="form-group" style="text-align: left;">
        <label style="color: #666; font-size: 0.8rem; text-transform: uppercase;">Enter 6-Digit OTP</label>
        <input type="text" id="otp-input" placeholder="000000" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 8px; font-weight: 800; border: 1px solid #333; width: 100%; background:#000; color:white; padding: 10px; border-radius: 8px;">
      </div>

      <button id="verify-otp-btn" class="btn-primary" style="width: 100%; margin-top: 1rem; padding: 12px;">VERIFY OTP</button>
      
      <div style="margin-top: 1.5rem;">
        <p id="resend-timer-text" style="color: #666; font-size: 0.8rem;">Resend code in <span id="timer" style="color: var(--primary);">30</span>s</p>
        <button id="resend-btn" style="background: none; border: none; color: var(--primary); font-weight: 700; cursor: pointer; display: none;">RESEND OTP</button>
      </div>
    </div>
  </div>

  <style>
    .modal-overlay.active {
      display: flex !important;
      opacity: 1 !important;
      pointer-events: auto !important;
    }
  </style>

  <script src="js/utils.js"></script>
  <script>
    let signupData = null;
    let timerInterval = null;

    document.getElementById('signup-form').onsubmit = async (e) => {
      e.preventDefault();
      
      signupData = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        city: document.getElementById('city').value,
        contactno: document.getElementById('contactno').value
      };

      try {
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerText = 'Sending OTP...';

        // 1. Send OTP
        UI.showMessage('Sending verification code...');
        const res = await API.fetch('/api/sendotp', {
          method: 'POST',
          body: JSON.stringify({ email: signupData.email })
        });

        if (res.success) {
          document.getElementById('display-email').textContent = signupData.email;
          const modal = document.getElementById('otpModal');
          modal.classList.add('active');
          startTimer();
          UI.showMessage('Success! Code sent to your email.', 'success');
        } else {
          submitBtn.disabled = false;
          submitBtn.innerText = 'Register';
        }
      } catch (err) {
        UI.showMessage(err.message || 'Failed to send OTP. Try again.');
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = false;
        submitBtn.innerText = 'Register';
      }
    };

    document.getElementById('verify-otp-btn').onclick = async () => {
      const otp = document.getElementById('otp-input').value;
      if (otp.length !== 6) return UI.showMessage('Enter valid 6-digit code');

      try {
        // 2. Verify OTP
        const verifyRes = await API.fetch('/api/verifyotp', {
          method: 'POST',
          body: JSON.stringify({ email: signupData.email, otp })
        });

        if (verifyRes.success) {
          // 3. Final Signup using existing route
          const signupRes = await API.fetch('/api/signup', {
            method: 'POST',
            body: JSON.stringify(signupData)
          });
          
          if (signupRes.success) {
             UI.showMessage('Verification Successful! Account Created.', 'success');
             setTimeout(() => window.location.href = '/login.html', 2000);
          }
        }
      } catch (err) {
        UI.showMessage(err.message);
      }
    };

    document.getElementById('resend-btn').onclick = async () => {
        try {
            await API.fetch('/api/sendotp', {
                method: 'POST',
                body: JSON.stringify({ email: signupData.email })
            });
            UI.showMessage('Resent! Check your email.', 'success');
            startTimer();
        } catch (e) {
            UI.showMessage(e.message);
        }
    };

    function startTimer() {
        let timeLeft = 30;
        document.getElementById('resend-btn').style.display = 'none';
        document.getElementById('resend-timer-text').style.display = 'block';
        document.getElementById('timer').textContent = timeLeft;
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('resend-btn').style.display = 'block';
                document.getElementById('resend-timer-text').style.display = 'none';
            }
        }, 1000);
    }
  </script>
</body>
</html>
