<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies Listing | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--bg-dark);">
  <nav id="navbar-container"></nav>

  <main class="container">
    <div class="listing-container">
      <!-- Sidebar Filters -->
      <aside class="filter-sidebar">
        <div class="filter-section">
          <h3>Languages</h3>
          <div class="filter-options">
            <label class="filter-label"><input type="checkbox" class="filter-checkbox lang-cb" value="Hindi" onchange="applyFilters()"> Hindi</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox lang-cb" value="English" onchange="applyFilters()"> English</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox lang-cb" value="Telugu" onchange="applyFilters()"> Telugu</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox lang-cb" value="Tamil" onchange="applyFilters()"> Tamil</label>
          </div>
        </div>

        <div class="filter-section">
          <h3>Genres</h3>
          <div class="filter-options">
            <label class="filter-label"><input type="checkbox" class="filter-checkbox gen-cb" value="Action" onchange="applyFilters()"> Action</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox gen-cb" value="Comedy" onchange="applyFilters()"> Comedy</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox gen-cb" value="Drama" onchange="applyFilters()"> Drama</label>
            <label class="filter-label"><input type="checkbox" class="filter-checkbox gen-cb" value="Thriller" onchange="applyFilters()"> Thriller</label>
          </div>
        </div>

        <button class="btn-clear-all" onclick="clearFilters()">Clear All Filters</button>
      </aside>

      <!-- Content Area -->
      <section class="listing-content">
        <div class="listing-header">
          <h1 id="listing-title">Movies in <span id="city-name" style="color:var(--primary)">All Cities</span></h1>
          <p class="subheading">Now showing latest movies for you</p>
          
          <div class="chips-wrapper" id="language-chips">
            <div class="filter-chip active" onclick="setChipFilter('all', this)">All</div>
            <div class="filter-chip" onclick="setChipFilter('Hindi', this)">Hindi</div>
            <div class="filter-chip" onclick="setChipFilter('English', this)">English</div>
            <div class="filter-chip" onclick="setChipFilter('Telugu', this)">Telugu</div>
            <div class="filter-chip" onclick="setChipFilter('Tamil', this)">Tamil</div>
          </div>
        </div>

        <div id="movies-grid" class="listing-grid">
           <!-- Dynamically Loaded Movies -->
        </div>
      </section>
    </div>
  </main>

  <script src="js/posterMap.js"></script>
  <script src="js/utils.js"></script>
  <script>
    let activeChip = 'all';
    const selectedCity = localStorage.getItem('selectedCity') || 'All Cities';

    async function loadMoviesListing() {
      const grid = document.getElementById('movies-grid');
      const titleCity = document.getElementById('city-name');
      if (titleCity) titleCity.textContent = selectedCity !== 'All Cities' ? selectedCity : 'Selected Cities';

      const langFilters = Array.from(document.querySelectorAll('.lang-cb:checked')).map(cb => cb.value);
      const genreFilters = Array.from(document.querySelectorAll('.gen-cb:checked')).map(cb => cb.value);

      try {
        let url = `/api/movies?action=list`;
        if (activeChip !== 'all') url += `&language=${activeChip}`;
        
        const { movies } = await API.fetch(url);
        let filtered = movies || [];
        
        if (langFilters.length > 0) {
           filtered = filtered.filter(m => langFilters.some(lang => m.language && m.language.includes(lang)));
        }
        if (genreFilters.length > 0) {
           filtered = filtered.filter(m => genreFilters.some(gen => m.genre && m.genre.includes(gen)));
        }

        if (filtered.length === 0) {
          grid.innerHTML = `<div style="grid-column: 1/-1; padding: 5rem; text-align: center; color: var(--text-muted); font-size: 1.2rem;">No matching movies found. 🎬</div>`;
          return;
        }

        grid.innerHTML = filtered.map(movie => {
          const posterUrl = MoviePoster.get(movie.movie_name);
          return `
            <div class="premium-card" onclick="window.location.href='/booking.html?id=${movie.movie_id}'">
              <div class="card-poster-wrapper">
                <div class="rating-badge">⭐ ${movie.movie_rating || 'N/A'}</div>
                <img src="${posterUrl}" alt="${movie.movie_name}" class="card-poster" onerror="this.onerror=null; this.src='/images/default-poster.jpg';">
              </div>
              <div class="card-content">
                <h3>${movie.movie_name}</h3>
                <div class="meta">${movie.language} • ${movie.genre}</div>
                <a href="/booking.html?id=${movie.movie_id}" class="btn-book" onclick="event.stopPropagation()">Book Now</a>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        console.error('Listing Error:', err);
        grid.innerHTML = `<div style="grid-column: 1/-1; padding: 5rem; text-align: center; color: var(--primary);">Failed to load movies.</div>`;
      }
    }

    window.applyFilters = () => loadMoviesListing();

    window.setChipFilter = (lang, el) => {
      activeChip = lang;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      loadMoviesListing();
    };

    window.clearFilters = () => {
      document.querySelectorAll('.filter-checkbox').forEach(cb => cb.checked = false);
      activeChip = 'all';
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      document.querySelector('.filter-chip[onclick*="all"]').classList.add('active');
      loadMoviesListing();
    };

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(loadMoviesListing, 100);
    });
  </script>
</body>
</html>
