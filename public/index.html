<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Magic | Discover & Book Tickets</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .movie-card {
      position: relative;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
      cursor: pointer;
      min-width: 200px;
      max-width: 200px;
      margin-right: 1.5rem;
      border: 1px solid #333;
    }
    .movie-card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      z-index: 10;
      border-color: var(--primary);
    }
    .movie-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: #252525;
      transition: opacity 0.3s ease;
    }
    .movie-card:hover img {
      opacity: 0.7;
    }
    .movie-info {
      padding: 1rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.95) 60%);
      position: absolute;
      bottom: 0;
      width: 100%;
      box-sizing: border-box;
      color: white;
    }
    .btn-book {
      padding: 8px 16px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.9rem;
      display: block;
      text-align: center;
      margin-top: 10px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
    }
    .movie-card:hover .btn-book {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <!-- City Selection Modal -->
  <div class="modal-overlay" id="cityModal">
    <div class="modal-content" style="position: relative;">
      <button onclick="closeCityModal()" style="position: absolute; top: 10px; right: 15px; background: transparent; color: var(--text-muted); border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
      <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Select Your City</h2>
      <p style="color: var(--text-muted);">Choose a city to see upcoming movies and shows.</p>
      <div class="city-grid" id="cityList">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <nav>
    <div style="display: flex; align-items: center; gap: 1.5rem;">
      <a href="/" class="logo">MOVIE MAGIC</a>
      <button id="navCityBtn" style="background: transparent; color: var(--text-muted); border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer;" onclick="showCityModal()">Select City ▾</button>
    </div>
    <div class="links" id="nav-links">
      <a href="/">Home</a>
      <a href="/login.html">Login</a>
      <a href="/signup.html">Signup</a>
    </div>
  </nav>

  <header class="container" style="text-align: center; padding: 4rem 5% 2rem;">
    <h1 style="font-size: 3rem; margin-bottom: 1rem;">Experience the <span style="color:var(--primary)">Magic</span> of Cinema</h1>
    <p style="color:var(--text-muted); font-size: 1.2rem;">Book tickets for the latest blockbusters in your city.</p>
  </header>

  <main>
    <div id="carousels-container">
      <div class="container loading" style="text-align: center;">Loading movies...</div>
    </div  </main>

  <script src="js/posterMap.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const CITIES = ['Mumbai', 'Delhi', 'Bengaluru', 'Hyderabad', 'Ahmedabad', 'Pune', 'Chennai', 'Kolkata', 'Kochi', 'Bhubaneswar'];
    let selectedCity = localStorage.getItem('selectedCity');

    const user = API.getSession();

    function initCity() {
      // Inject cities into grid
      const cityList = document.getElementById('cityList');
      if (cityList) {
        cityList.innerHTML = CITIES.map(city => `
          <button class="city-btn" onclick="selectCity('${city}')">${city}</button>
        `).join('');
      }

      // Check for showModal query param
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('showModal') === 'true') {
        showCityModal();
      }

      if (selectedCity) {
        updateNavCity();
      }
      loadMovies(); 
    }

    function showCityModal() {
      const modal = document.getElementById('cityModal');
      if (modal) modal.classList.add('active');
    }

    function closeCityModal() {
      const modal = document.getElementById('cityModal');
      if (modal) modal.classList.remove('active');
    }

    function selectCity(city) {
      selectedCity = city;
      localStorage.setItem('selectedCity', city);
      closeCityModal();
      updateNavCity();
      loadMovies();
    }

    function updateNavCity() {
      const btn = document.getElementById('navCityBtn');
      if(btn && selectedCity) {
        btn.textContent = selectedCity + ' ▾';
      }
    }

    function scrollCarousel(id, direction) {
      const container = document.getElementById(id);
      if (!container) return;
      const scrollAmount = 300;
      container.scrollBy({ left: direction === 'left' ? -scrollAmount : scrollAmount, behavior: 'smooth' });
    }

    function generateMovieCard(movie) {
      const posterUrl = MoviePoster.get(movie.movie_name);
      
      return `
        <div class="movie-card" onclick="window.location.href='/booking.html?id=${movie.movie_id}'">
          <img src="${posterUrl}" alt="${movie.movie_name}" class="poster">
          <div class="movie-info">
            <h3 style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; font-size: 1.1rem;">${movie.movie_name}</h3>
            <div class="meta" style="font-size: 0.8rem; margin: 5px 0; color: #ccc;">⭐ ${movie.movie_rating} • ${movie.language}</div>
            <div class="meta" style="font-size: 0.75rem; color: #aaa;">${movie.genre}</div>
            <a href="/booking.html?id=${movie.movie_id}" class="btn-book">Book Now</a>
          </div>
        </div>
      `;
    }

    function renderCarousel(title, id, movies) {
      if (!movies || movies.length === 0) return '';
      return `
        <div class="carousel-section">
          <h2>${title}</h2>
          <button class="scroll-btn left" onclick="scrollCarousel('${id}', 'left')">❮</button>
          <div class="carousel-container" id="${id}">
            ${movies.map(m => generateMovieCard(m)).join('')}
          </div>
          <button class="scroll-btn right" onclick="scrollCarousel('${id}', 'right')">❯</button>
        </div>
      `;
    }

    function getFallbackMovies() {
      const movies = [
        { movie_id: 'M001', movie_name: 'RAAKA', movie_rating: '9.2', language: 'Telugu/Hindi', genre: 'Action/Thriller' },
        { movie_id: 'M002', movie_name: 'OG', movie_rating: '9.5', language: 'Telugu', genre: 'Gangster Drama' },
        { movie_id: 'M003', movie_name: 'SPIRIT', movie_rating: '9.0', language: 'Multi-Language', genre: 'Crime/Action' },
        { movie_id: 'M004', movie_name: 'VARANASI', movie_rating: '8.8', language: 'Hindi', genre: 'Spiritual/Drama' },
        { movie_id: 'M005', movie_name: 'DRAGON', movie_rating: '8.5', language: 'English', genre: 'Fantasy/Action' },
        { movie_id: 'M006', movie_name: 'PUSHPA THE RULE', movie_rating: '9.8', language: 'Multi-Language', genre: 'Action/Drama' },
        { movie_id: 'M007', movie_name: 'BAHUBALI 2', movie_rating: '9.9', language: 'Multi-Language', genre: 'Epic/Action' },
        { movie_id: 'M008', movie_name: 'STRANGER THINGS S5', movie_rating: '9.7', language: 'English', genre: 'Sci-Fi/Horror' },
        { movie_id: 'M009', movie_name: 'AVENGERS END GAME', movie_rating: '9.6', language: 'English', genre: 'Superhero' },
        { movie_id: 'MT002', movie_name: 'RRR', movie_rating: '9.7', language: 'Telugu/Hindi', genre: 'Action/Drama' },
        { movie_id: 'MT003', movie_name: 'Kalki 2898 AD', movie_rating: '9.2', language: 'Telugu/Hindi', genre: 'Sci-Fi/Epic' },
        { movie_id: 'MH002', movie_name: 'Avatar: Way of Water', movie_rating: '9.2', language: 'English', genre: 'Sci-Fi/Action' },
        { movie_id: 'MH003', movie_name: 'Titanic', movie_rating: '9.4', language: 'English', genre: 'Romance/Drama' },
        { movie_id: 'MH005', movie_name: 'Avengers: Infinity War', movie_rating: '9.5', language: 'English', genre: 'Superhero' },
        { movie_id: 'MH006', movie_name: 'Spider-Man: No Way Home', movie_rating: '9.3', language: 'English', genre: 'Superhero' },
        { movie_id: 'MH007', movie_name: 'Jurassic World', movie_rating: '8.7', language: 'English', genre: 'Sci-Fi/Adventure' },
        { movie_id: 'MB002', movie_name: 'Jawan', movie_rating: '9.3', language: 'Hindi', genre: 'Action/Thriller' },
        { movie_id: 'MB007', movie_name: 'Gadar 2', movie_rating: '8.5', language: 'Hindi', genre: 'Action/Drama' },
        { movie_id: 'MB008', movie_name: 'Sultan', movie_rating: '8.9', language: 'Hindi', genre: 'Sports/Drama' }
      ];
      return movies;
    }

    async function loadMovies() {
      const container = document.getElementById('carousels-container');
      if (!container) return;

      let moviesData = [];
      try {
        const url = selectedCity ? `/api/movies?city=${selectedCity}` : '/api/movies';
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 2000);

        const { movies } = await API.fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        moviesData = (movies && movies.length > 0) ? movies : getFallbackMovies();
      } catch (err) {
        moviesData = getFallbackMovies();
      }
      
      let recommended = [], trending = [], comingSoon = [], topRated = [];
      let tollywood = [], bollywood = [], hollywood = [];

      moviesData.forEach((m, idx) => {
        const rating = parseFloat(m.movie_rating);
        
        // Industry Categorization
        if (m.category === 'Tollywood') tollywood.push(m);
        else if (m.category === 'Bollywood') bollywood.push(m);
        else if (m.category === 'Hollywood') hollywood.push(m);

        // General Categorization
        if (m.status === 'Coming Soon' || m.status === 'In Production') {
          comingSoon.push(m);
        } else {
          if (rating >= 9.5) topRated.push(m);
          if (idx % 2 === 0 || rating > 9.0) recommended.push(m);
          if (idx % 3 === 0 || idx % 2 !== 0) trending.push(m);
        }
      });

      container.innerHTML = 
        renderCarousel('Recommended Movies', 'c-rec', recommended) +
        renderCarousel('Tollywood Blockbusters', 'c-tolly', tollywood) +
        renderCarousel('Bollywood Hits', 'c-bolly', bollywood) +
        renderCarousel('Hollywood Specials', 'c-holly', hollywood) +
        renderCarousel('Trending Now', 'c-trend', trending) +
        renderCarousel('Coming Soon', 'c-coming', comingSoon) +
        renderCarousel('Top Rated', 'c-top', topRated);
    }

    function goToBooking(id) {
      const currUser = API.getSession();
      if (!currUser) {
        UI.showMessage('Please login to book tickets', 'error');
        setTimeout(() => window.location.href = '/login.html', 1500);
        return;
      }
      if (!selectedCity) {
        showCityModal();
        return;
      }
      window.location.href = `/booking.html?movieId=${id}`;
    }

    initCity();
  </script>
</body>
</html>
