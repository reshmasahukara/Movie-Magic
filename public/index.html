<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Magic | Discover & Book Tickets</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .movie-card {
      position: relative;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
      cursor: pointer;
      min-width: 280px;
      max-width: 280px;
      margin-right: 2rem;
      border: 1px solid #333;
    }
    
    /* SECTION HEADER BAR */
    .section-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding: 0 1rem;
    }
    .section-header-bar h2 {
      font-size: 1.8rem;
      font-weight: 900;
      margin: 0;
      letter-spacing: -0.5px;
    }
    .see-all-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: gap 0.3s;
    }
    .see-all-link:hover { gap: 10px; }



    /* EVENT CARDS (Music & Outdoor) */
    .event-card, .music-card, .outdoor-card { 
      min-width: 320px; border-radius: 12px; overflow: hidden; background: #111; border: 1px solid #222;
      transition: all 0.3s ease; scroll-snap-align: start; margin-right: 2rem; display: flex; flex-direction: column;
    }
    .event-card:hover { border-color: var(--primary); transform: translateY(-5px); }

    .event-card img, .music-card img, .outdoor-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 14px;
    }

    .event-card .image-box, .music-card .image-box, .outdoor-card .image-box {
      width: 100%;
      height: 220px;
      overflow: hidden;
      background: #111;
      border-radius: 14px;
    }

    .event-card-content { padding: 1.2rem; display: flex; flex-direction: column; flex: 1; }
    .event-date { color: var(--primary); font-size: 0.75rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; }
    .event-name { font-weight: 800; font-size: 1.1rem; margin-bottom: 10px; line-height: 1.2; color: #eee; }
    .event-meta { font-size: 0.8rem; color: #666; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .event-tag { display: inline-block; padding: 3px 8px; background: rgba(255,255,255,0.05); border-radius: 4px; font-size: 0.7rem; color: #999; width: fit-content; }


    .poster {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      border-radius: 14px 14px 0 0;
    }
  </style>
</head>
<body>
  <!-- City Selection Modal -->
  <div class="modal-overlay" id="cityModal">
    <div class="modal-content" style="position: relative;">
      <button onclick="closeCityModal()" style="position: absolute; top: 10px; right: 15px; background: transparent; color: var(--text-muted); border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
      <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Select Your City</h2>
      <p style="color: var(--text-muted);">Choose a city to see upcoming movies and shows.</p>
      <div class="city-grid" id="cityList">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <nav>
    <div style="display: flex; align-items: center; gap: 1.5rem; flex: 1;">
      <a href="/" class="logo"><i>🎬</i> MOVIE MAGIC</a>
      <button id="navCityBtn" style="background: transparent; color: var(--text-muted); border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer;" onclick="showCityModal()">Select City ▾</button>
    </div>

    <!-- Search Bar (Requirement 9: Search/Filter) -->
    <div style="flex: 2; max-width: 600px; position: relative; margin: 0 2rem;" class="no-mobile">
      <input type="text" id="movie-search" placeholder="Search for Movies, Events, Plays and Sports" style="width: 100%; background: #222; border: 1px solid #333; padding: 0.8rem 1rem 0.8rem 3rem; border-radius: 8px; color: white; font-size: 0.9rem; transition: border-color 0.3s;">
      <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); opacity: 0.4;">🔍</span>
    </div>

    <div class="links" id="nav-links" style="flex: 1; display: flex; justify-content: flex-end; gap: 2rem;">
      <a href="/">Home</a>
      <a href="/login.html">Login</a>
      <a href="/signup.html">Signup</a>
    </div>
  </nav>  <header class="container" style="text-align: center; padding: 2rem 1% 1rem;">
    <h1 style="font-size: 3rem; margin-bottom: 0.5rem; font-weight: 900;">Cinema & <span style="color:var(--primary)">Entertainment</span> Live</h1>
    <p style="color:var(--text-muted); font-size: 1.1rem; letter-spacing: 1px;">Join thousands of fans at the best movies and live events.</p>
  </header>

  <main>
    <!-- 1. Movies Section -->
    <div id="recommended-movies-section" class="container" style="margin-top: 1rem;">
      <div class="carousel-section">
        <div class="section-header-bar" style="padding: 0 1%;">
          <h2>Recommended Movies</h2>
          <a href="#" class="see-all-link">See All ❯</a>
        </div>
        <button class="scroll-btn left" onclick="scrollCarousel('movies-list', 'left')">❮</button>
        <div class="carousel-container" id="movies-list">
          <!-- Movies injected here -->
        </div>
        <button class="scroll-btn right" onclick="scrollCarousel('movies-list', 'right')">❯</button>
      </div>
    </div>


    <!-- 2. Event Filters -->
    <div class="container" style="margin-top: 2rem;">
      <div id="event-filters" style="display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid var(--glass);">
        <button class="filter-btn active" onclick="filterEvents('all')">All</button>
        <button class="filter-btn" onclick="filterEvents('Music')">Music</button>
        <button class="filter-btn" onclick="filterEvents('Comedy')">Comedy</button>
        <button class="filter-btn" onclick="filterEvents('Outdoor')">Outdoor</button>
        <button class="filter-btn" onclick="filterEvents('Sports')">Sports</button>
        <button class="filter-btn" onclick="filterEvents('Workshops')">Workshops</button>
      </div>
    </div>

    <style>
      .filter-btn { padding: 8px 20px; background: transparent; border: 1px solid #333; color: white; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: all 0.3s; }
      .filter-btn.active { background: var(--primary); border-color: var(--primary); }
      .filter-btn:hover:not(.active) { border-color: var(--primary); }
    </style>

    <!-- 3. Dynamic Events Container -->
    <div id="events-sections-container">
       <div style="padding: 3rem; text-align: center; color: #444;">Fetching live entertainment...</div>
    </div>
  </main>

  <script src="js/posterMap.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const CITIES = ['Mumbai', 'Delhi', 'Bengaluru', 'Hyderabad', 'Ahmedabad', 'Pune', 'Chennai', 'Kolkata', 'Kochi', 'Bhubaneswar'];
    let selectedCity = localStorage.getItem('selectedCity');



    let selectedCategory = 'all';

    function getFallbackEvents() {
      return [
        { id: 1, event_name: 'MI vs CSK', category: 'Sports', city: 'Mumbai', venue: 'Wankhede Stadium', event_date: '2026-05-16', image_url: 'https://i.pinimg.com/videos/thumbnails/originals/a0/8f/e0/a08fe047f55493fbca44602ddc5cee5e.0000000.jpg', price: 999 },
        { id: 2, event_name: 'Sunburn Festival', category: 'Festival', city: 'Goa', venue: 'Vagator', event_date: '2026-12-28', image_url: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=400', price: 5000 },
        { id: 3, event_name: 'Zakir Khan Live', category: 'Comedy', city: 'Mumbai', venue: 'Shanmukhananda Hall', event_date: '2026-05-20', image_url: 'https://m.media-amazon.com/images/I/71R3yX-S1JL._RI_.jpg', price: 1200 },
        { id: 4, event_name: 'Wonderla Adventure', category: 'Outdoor', city: 'Bengaluru', venue: 'Wonderla', event_date: '2026-05-24', image_url: 'https://i.pinimg.com/originals/be/53/74/be53745621b23ab86399d7c0d8b03aaf.jpg', price: 1499 },
        { id: 5, event_name: 'Pottery Workshop', category: 'Workshops', city: 'Mumbai', venue: 'The Art Studio', event_date: '2026-05-18', image_url: 'https://images.unsplash.com/photo-1565191999001-551c187427bb?auto=format&fit=crop&w=400', price: 1500 }
      ];
    }

    async function updateEvents() {
      const container = document.getElementById('events-sections-container');
      if (!container) return;

      try {
        const cityFilter = selectedCity || 'all';
        const url = `/api/events?action=list&city=${cityFilter}&category=${selectedCategory}`;
        const { events } = await API.fetch(url);
        
        let displayEvents = (events && events.length > 0) ? events : getFallbackEvents();
        
        // Filter by category if needed (API should do this, but safe fallback)
        if (selectedCategory !== 'all') {
          displayEvents = displayEvents.filter(e => e.category === selectedCategory);
        }

        if (displayEvents.length === 0) {
          container.innerHTML = `
            <div class="container" style="padding: 5rem 2rem; text-align: center; color: var(--text-muted); background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px dashed #333; margin-top:2rem;">
              <p style="font-size: 1.2rem;">No events match your criteria. 🎫</p>
              <button onclick="filterEvents('all')" class="btn-primary" style="margin-top: 1.5rem">Browse All</button>
            </div>
          `;
          return;
        }

        // Group by category
        const groups = {};
        displayEvents.forEach(ev => {
          if (!groups[ev.category]) groups[ev.category] = [];
          groups[ev.category].push(ev);
        });

        // Render sections
        container.innerHTML = Object.keys(groups).map(cat => {
          const listId = `list-${cat.toLowerCase().replace(/[^a-z0-9]/g, '-')}`;
          const sliderHtml = renderEventSliderHTML(groups[cat]);
          return `
            <div class="container" style="margin-top: 2rem; margin-bottom: 2rem;">
              <div class="carousel-section">
                <div class="section-header-bar" style="padding: 0 1%;">
                  <h2>${cat} Events</h2>
                  <a href="#" class="see-all-link">See All ❯</a>
                </div>
                <button class="scroll-btn left" onclick="scrollCarousel('${listId}', 'left')">❮</button>
                <div class="carousel-container" id="${listId}">
                  ${sliderHtml}
                </div>
                <button class="scroll-btn right" onclick="scrollCarousel('${listId}', 'right')">❯</button>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        console.error('Failed to load events:', err);
        const fb = getFallbackEvents();
        const groups = { 'Featured': fb };
        container.innerHTML = Object.keys(groups).map(cat => {
          const listId = `list-${cat.toLowerCase().replace(/[^a-z0-9]/g, '-')}`;
          return `
            <div class="container" style="margin-top: 2rem; margin-bottom: 2rem;">
              <div class="carousel-section">
                <div class="section-header-bar" style="padding: 0 1%;">
                  <h2>Recommended for You</h2>
                </div>
                <button class="scroll-btn left" onclick="scrollCarousel('${listId}', 'left')">❮</button>
                <div class="carousel-container" id="${listId}">
                  ${renderEventSliderHTML(fb)}
                </div>
                <button class="scroll-btn right" onclick="scrollCarousel('${listId}', 'right')">❯</button>
              </div>
            </div>
          `;
        }).join('');
      }
    }

    function renderEventSliderHTML(data) {
      return data.map(ev => {
        const date = new Date(ev.event_date).toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' });
        const fallbackImg = 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=400';
        return `
        <div class="event-card" onclick="window.location.href='/event-booking.html?id=${ev.id}'">
          <div class="image-box">
            <img src="${ev.image_url}" alt="${ev.event_name}" onerror="this.onerror=null; this.src='${fallbackImg}';">
          </div>
          <div class="event-card-content">
            <span class="event-date">${date}</span>
            <span class="event-name">${ev.event_name}</span>
            <div class="event-meta">📍 ${ev.venue}</div>
            <div class="event-meta">🏢 ${ev.city}</div>
            <div style="margin-top: 15px; display: flex; align-items: center; justify-content: space-between;">
              <span class="event-tag">${ev.category}</span>
              <button class="btn-book" style="padding: 6px 14px; font-size: 0.7rem;" 
                onclick="event.stopPropagation(); window.location.href='/event-booking.html?id=${ev.id}'">
                ${ev.status === 'Sold Out' ? 'Sold Out' : 'Book Now'}
              </button>
            </div>
          </div>
        </div>
      `}).join('');
    }

    window.filterEvents = async (category) => {
      selectedCategory = category;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      // Find and activate the button
      const btns = document.querySelectorAll('.filter-btn');
      btns.forEach(btn => {
        if(btn.innerText.includes(category) || (category === 'all' && btn.innerText === 'All')) {
          btn.classList.add('active');
        }
      });
      await updateEvents();
    };

    function initCity() {
      // Inject cities into grid
      const cityList = document.getElementById('cityList');
      if (cityList) {
        cityList.innerHTML = CITIES.map(city => `<button class="city-btn" onclick="selectCity('${city}')">${city}</button>`).join('');
      }

      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('showModal') === 'true') showCityModal();

      if (selectedCity) updateNavCity();
      
      loadMovies(); 
      updateEvents();
    }

    function showCityModal() {
      const modal = document.getElementById('cityModal');
      if (modal) modal.classList.add('active');
    }

    function closeCityModal() {
      const modal = document.getElementById('cityModal');
      if (modal) modal.classList.remove('active');
    }

    function selectCity(city) {
      selectedCity = city;
      localStorage.setItem('selectedCity', city);
      closeCityModal();
      updateNavCity();
      loadMovies();
      updateEvents();
    }

    function updateNavCity() {
      const btn = document.getElementById('navCityBtn');
      if(btn && selectedCity) btn.textContent = selectedCity + ' ▾';
    }

    function setupSearch() {
      const input = document.getElementById('movie-search');
      if (!input) return;
      input.oninput = () => {
        const q = input.value.toLowerCase();
        const cards = document.querySelectorAll('#movies-list .movie-card');
        cards.forEach(card => {
          const title = card.querySelector('h3').textContent.toLowerCase();
          card.style.display = title.includes(q) ? 'block' : 'none';
        });
      };
    }

    function scrollCarousel(id, direction) {
      const container = document.getElementById(id);
      if (!container) return;
      container.scrollBy({ left: direction === 'left' ? -400 : 400, behavior: 'smooth' });
    }

    function generateMovieCard(movie) {
      const posterUrl = MoviePoster.get(movie.movie_name);
      return `
        <div class="movie-card" onclick="window.location.href='/booking.html?id=${movie.movie_id}'">
          <img src="${posterUrl}" alt="${movie.movie_name}" class="poster" onerror="this.onerror=null; this.src=(this.alt.toLowerCase().includes('baahubali') || this.alt.toLowerCase().includes('bahubali')) ? '/images/movies/baahubali-beginning.jpg' : '/images/default-poster.jpg';">
          <div class="movie-info">
            <h3 style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; font-size: 1.1rem;">${movie.movie_name}</h3>
            <div class="meta" style="font-size: 0.8rem; margin: 5px 0; color: #ccc;">⭐ ${movie.movie_rating} • ${movie.language}</div>
            <div class="meta" style="font-size: 0.75rem; color: #aaa; margin-bottom: 1.2rem;">${movie.genre}</div>
            <a href="/booking.html?id=${movie.movie_id}" class="btn-book" onclick="event.stopPropagation()">Book Now</a>
          </div>
        </div>
      `;
    }




    function getFallbackMovies() {
      return [
        { movie_id: 'M001', movie_name: 'RAAKA', movie_rating: '9.2', language: 'Telugu/Hindi', genre: 'Action/Thriller' },
        { movie_id: 'M002', movie_name: 'OG', movie_rating: '9.5', language: 'Telugu', genre: 'Gangster Drama' },
        { movie_id: 'M006', movie_name: 'PUSHPA THE RULE', movie_rating: '9.8', language: 'Multi-Language', genre: 'Action/Drama' },
        { movie_id: 'MT002', movie_name: 'RRR', movie_rating: '9.7', language: 'Telugu/Hindi', genre: 'Action/Drama' },
        { movie_id: 'MT003', movie_name: 'Kalki 2898 AD', movie_rating: '9.2', language: 'Telugu/Hindi', genre: 'Sci-Fi/Epic' },
        { movie_id: 'MB007', movie_name: 'Gadar 2', movie_rating: '8.5', language: 'Hindi', genre: 'Action/Drama' },
        { movie_id: 'MH001', movie_name: 'Avatar', movie_rating: '9.0', language: 'English', genre: 'Sci-Fi/Action' },
        { movie_id: 'M004', movie_name: 'VARANASI', movie_rating: '8.8', language: 'Hindi', genre: 'Spiritual/Drama' }
      ];
    }

    async function loadMovies() {
      const list = document.getElementById('movies-list');
      if (!list) return;

      let moviesData = [];
      try {
        const url = selectedCity ? `/api/movies?action=moviesdash&city=${selectedCity}` : '/api/movies?action=moviesdash';
        const { movies } = await API.fetch(url);
        moviesData = (movies && movies.length > 0) ? movies : getFallbackMovies();
      } catch (err) {
        moviesData = getFallbackMovies();
      }

      // Filter Avatar 2
      moviesData = moviesData.filter(m => m.movie_name !== "Avatar: The Way of Water" && m.movie_name !== "Avatar:Way of Water");
      
      list.innerHTML = moviesData.map(m => generateMovieCard(m)).join('');
      setupSearch();
    }

    initCity();
  </script>
</body>
</html>
