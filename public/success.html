<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Libraries for Ticket Download & QR Generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    .success-container { text-align: center; padding: 4rem 1rem; }
    
    .ticket-card {
      background: #121212;
      color: white;
      width: 100%;
      max-width: 400px;
      margin: 2rem auto;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }

    .ticket-header { background: var(--primary); padding: 1.2rem; text-align: center; }
    .ticket-body { padding: 2rem; }
    
    .movie-title { font-size: 2.2rem; font-weight: 800; line-height: 1; margin-bottom: 2rem; color: white; text-transform: uppercase; }

    .ticket-info { display: flex; justify-content: space-between; margin-bottom: 1.5rem; text-align: left; }
    .info-label { color: #666; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
    .info-val { font-weight: 600; font-size: 0.95rem; }

    .perforated {
      border-top: 2px dashed #222;
      margin: 2rem 0;
      position: relative;
    }
    .perforated::before, .perforated::after {
      content: '';
      position: absolute;
      top: -12px;
      width: 24px;
      height: 24px;
      background: var(--bg-dark);
      border-radius: 50%;
    }
    .perforated::before { left: -32px; }
    .perforated::after { right: -32px; }

    .qr-container {
      background: white;
      width: 140px;
      height: 140px;
      margin: 0 auto;
      padding: 10px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #qrcode-canvas { width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>
  <nav></nav>

  <main class="container">
    <div class="success-container animate-fade-in">
      <div style="background: rgba(40, 167, 69, 0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid #28a745;">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#28a745" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      
      <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Payment Successful!</h1>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Your ticket has been generated and is ready for download.</p>

      <!-- Digital Ticket Card -->
      <div id="ticket-element" class="ticket-card">
        <div class="ticket-header">
          <p style="letter-spacing: 5px; font-weight: 900; font-size: 0.7rem; margin: 0; color: white; opacity: 0.9;">OFFICIAL CINEMA PASS</p>
        </div>
        <div class="ticket-body">
          <h2 id="t-movie" class="movie-title">MOVIE NAME</h2>
          
          <div class="ticket-info">
            <div>
              <p class="info-label">Theater</p>
              <p class="info-val" id="t-theater">Cinema Venue</p>
            </div>
            <div style="text-align: right;">
              <p class="info-label">Show Time</p>
              <p class="info-val" id="t-time">00:00 AM</p>
            </div>
          </div>

          <div class="ticket-info">
            <div>
              <p class="info-label">Date</p>
              <p class="info-val" id="t-date">Jan 01, 2026</p>
            </div>
            <div style="text-align: right;">
              <p class="info-label">Seats</p>
              <p class="info-val" id="t-seats">None</p>
            </div>
          </div>

          <div class="perforated"></div>

          <div class="ticket-info">
            <div>
              <p class="info-label">Booking ID</p>
              <p class="info-val" style="color: var(--primary)">#<span id="t-id">00000</span></p>
            </div>
            <div style="text-align: right;">
              <p class="info-label">Price Paid</p>
              <p class="info-val">₹<span id="t-price">0</span></p>
            </div>
          </div>

          <div class="qr-container">
            <canvas id="qrcode-canvas"></canvas>
          </div>
          <p style="font-size: 0.6rem; color: #444; margin-top: 1rem; text-transform: uppercase; letter-spacing: 1px;">Authorized Admission Only</p>
        </div>
      </div>

      <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
        <button onclick="downloadTicket()" class="btn-primary" style="background: transparent; border: 1px solid var(--primary); color: white;">Download Ticket (PDF)</button>
        <button onclick="window.location.href='/history.html'" class="btn-primary">View All Bookings</button>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    async function init() {
      // 1. Load data from localStorage (populated after payment success)
      let data = null;
      const lastBookingId = localStorage.getItem('last_booking_id');
      const paymentData = localStorage.getItem('paymentData');

      if (paymentData) {
        data = JSON.parse(paymentData);
      } else if (lastBookingId) {
        // Fallback or retry logic if needed
        UI.showMessage("Booking data found in history.", "success");
        return window.location.href = '/history.html';
      } else {
        UI.showMessage("No active booking data found.");
        setTimeout(() => window.location.href = '/', 2000);
        return;
      }

      // 2. Render Ticket UI
      document.getElementById('t-movie').textContent = data.movie_name;
      document.getElementById('t-theater').textContent = "Movie Magic Cinemas"; // Default or dynamic if stored
      document.getElementById('t-time').textContent = data.timmings;
      document.getElementById('t-date').textContent = new Date(data.show_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      document.getElementById('t-seats').textContent = data.seats.join(', ');
      document.getElementById('t-price').textContent = data.amount;
      document.getElementById('t-id').textContent = data.booking_id;

      // 3. Generate QR Code
      const canvas = document.getElementById('qrcode-canvas');
      const qrData = JSON.stringify({
        booking: data.booking_id,
        seats: data.seats,
        user: data.user_id
      });

      QRCode.toCanvas(canvas, qrData, { 
        width: 140, 
        margin: 0,
        color: { dark: '#000000', light: '#FFFFFF' }
      }, function (error) {
        if (error) console.error('QR Error:', error);
      });
      
      // Optional: Cleanup if needed, but usually keep for download
      // localStorage.removeItem('paymentData'); 
    }

    function downloadTicket() {
      const element = document.getElementById('ticket-element');
      const bookingId = document.getElementById('t-id').textContent;
      
      const opt = {
        margin:       10,
        filename:     `TICKET_MM_${bookingId}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, backgroundColor: '#0A0A0A' },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().set(opt).from(element).save();
    }

    init();
  </script>
</body>
</html>
