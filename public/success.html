<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Libraries for Ticket Download & QR Generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    .success-container { text-align: center; padding: 4rem 1rem; max-width: 900px; margin: 0 auto; }
    
    /* TICKET DESIGN */
    .ticket-container { 
      background: #1a1a1a; 
      border-radius: 20px; 
      padding: 0; 
      border: 1px solid rgba(255,255,255,0.05); 
      position: relative; 
      overflow: hidden; 
      box-shadow: 0 30px 60px rgba(0,0,0,0.5); 
      width: 100%; 
      max-width: 450px; 
      margin: 2rem auto;
      text-align: left;
    }

    .ticket-header { 
      background: var(--primary); 
      padding: 1.5rem; 
      text-align: center;
      position: relative;
    }

    .brand-title { letter-spacing: 6px; font-weight: 900; font-size: 1.1rem; margin: 0; color: white; text-transform: uppercase; }
    .brand-tagline { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; margin-top: 5px; color: white; }

    .ticket-body { padding: 2.5rem; position: relative; }
    
    .movie-title { 
      font-size: 2rem; 
      font-weight: 900; 
      line-height: 1.1; 
      margin-bottom: 2rem; 
      color: white; 
      text-transform: uppercase;
    }

    .ticket-info { display: flex; justify-content: space-between; margin-bottom: 1.5rem; }
    .info-label { color: #555; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
    .info-val { font-weight: 600; font-size: 0.95rem; color: #eee; }

    .perforated {
      border-top: 2px dashed #222;
      margin: 2rem 0;
      position: relative;
    }
    .perforated::before, .perforated::after {
      content: '';
      position: absolute;
      top: -12px;
      width: 24px;
      height: 24px;
      background: var(--bg-dark);
      border-radius: 50%;
    }
    .perforated::before { left: -36px; }
    .perforated::after { right: -36px; }

    .qr-container {
      background: white;
      width: 130px;
      height: 130px;
      margin: 0 auto;
      padding: 10px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #qrcode-canvas { width: 100% !important; height: 100% !important; }

    /* Print Logic */
    @media print {
      nav, footer, .btn-group, .no-print { display: none !important; }
      body { background: white !important; }
      .ticket-container { box-shadow: none; border: 1px solid #ddd; margin: 0 auto; background: white !important; }
      .ticket-body, .info-val, .movie-title { color: black !important; }
      .info-label { color: #888 !important; }
      .qr-container { border: 1px solid #eee; }
    }
  </style>
</head>
<body>
  <nav></nav>

  <main class="container">
    <div id="content-anchor" class="success-container animate-fade-in">
      <p style="padding: 5rem; color: var(--text-muted)">Generating your digital pass...</p>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    function formatSafeDate(d) {
      if (!d) return "N/A";
      const raw = d.split('T')[0];
      const parts = raw.split('-');
      if (parts.length !== 3) return d;
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      return `${parseInt(parts[2], 10)} ${months[parseInt(parts[1], 10)-1]} ${parts[0]}`;
    }

    async function initSuccess() {
      const lastBookingId = localStorage.getItem('last_booking_id');
      const pData = localStorage.getItem('paymentData');
      let data = pData ? JSON.parse(pData) : null;

      // 1. Recovery Logic
      if (!data && lastBookingId) {
        try {
          const user = API.getSession();
          if (user) {
            const history = await API.fetch(`/api/booking?action=history&userid=${user.user_id}`);
            const latest = history.bookings.find(b => b.id == lastBookingId);
            if (latest) {
               data = {
                 booking_id: latest.id,
                 movie_name: latest.movie_name,
                 theater_name: latest.theater_name || "Movie Magic Cinemas",
                 timmings: latest.timmings,
                 show_date: latest.show_date,
                 seats: typeof latest.selected_seats === 'string' ? JSON.parse(latest.selected_seats) : latest.selected_seats,
                 amount: latest.price
               };
            }
          }
        } catch (e) { console.error("Recovery failed:", e); }
      }

      if (!data) {
        UI.safeRender('content-anchor', `
          <div style="padding: 4rem 1rem;">
            <h2 style="color: white;">No Active Booking Found</h2>
            <p style="color: var(--text-muted); margin: 1rem 0;">Check your history for previous bookings.</p>
            <button onclick="window.location.href='/history.html'" class="btn-primary">Go to History</button>
          </div>
        `);
        return;
      }

      // Dynamic Theatre Name Logic
      const theatreName = 
        data.theater_name || 
        JSON.parse(localStorage.getItem("paymentData") || "{}")?.theater_name || 
        localStorage.getItem("selectedTheater") || 
        "Movie Magic Cinemas";

      // 2. Render Premium Ticket
      const template = `
        <div style="background: rgba(40, 167, 69, 0.1); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid #28a745;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#28a745" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem;">Congratulations!</h1>
        <p style="color: var(--text-muted);">Payment successful. Your digital pass is below.</p>

        <div id="ticket-element" class="ticket-container">
          <div class="ticket-header">
            <p class="brand-title">MOVIE MAGIC</p>
            <p class="brand-tagline">Premium Cinema Experience</p>
          </div>
          <div class="ticket-body">
            <h2 class="movie-title">${data.movie_name}</h2>
            
            <div class="ticket-info">
              <div>
                <p class="info-label">Cinema</p>
                <p class="info-val">${theatreName}</p>
              </div>
              <div style="text-align: right;">
                <p class="info-label">Time</p>
                <p class="info-val">${data.timmings}</p>
              </div>
            </div>

            <div class="ticket-info">
              <div>
                <p class="info-label">Date</p>
                <p class="info-val">${formatSafeDate(data.show_date).toUpperCase()}</p>
              </div>
              <div style="text-align: right;">
                <p class="info-label">Seats</p>
                <p class="info-val">${data.seats.join(', ')}</p>
              </div>
            </div>

            <div class="perforated"></div>

            <div class="ticket-info">
              <div>
                <p class="info-label">Booking ID</p>
                <p class="info-val" style="color: var(--primary)">#${data.booking_id}</p>
              </div>
              <div style="text-align: right;">
                <p class="info-label">Status</p>
                <p class="info-val" style="color: #28a745;">PAID</p>
              </div>
            </div>

            <div class="qr-container">
              <canvas id="qrcode-canvas"></canvas>
            </div>
          </div>
        </div>

        <div class="btn-group no-print" style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
          <button onclick="window.print()" class="btn-primary" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">Download Ticket</button>
          <a href="/history.html" class="btn-primary" style="text-decoration: none;">View History</a>
        </div>
      `;

      UI.safeRender('content-anchor', template);

      // 3. QR Gen
      setTimeout(() => {
        const canvas = document.getElementById('qrcode-canvas');
        if(canvas) {
          QRCode.toCanvas(canvas, `BOOKING-${data.booking_id}`, { width: 130, margin: 0 });
        }
      }, 100);

      // 4. Final Cleanup
      localStorage.removeItem('paymentData');
    }

    window.addEventListener('load', initSuccess);
  </script>
</body>
</html>
