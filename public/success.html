<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed | Movie Magic</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Libraries for Ticket Download & QR Generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    .success-container { text-align: center; padding: 4rem 1rem; max-width: 900px; margin: 0 auto; }
    
    .ticket-card {
      background: #121212;
      color: white;
      width: 100%;
      max-width: 400px;
      margin: 2rem auto;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }

    .ticket-header { 
      background: var(--primary); 
      padding: 1.5rem; 
      text-align: center;
      position: relative;
      z-index: 2;
    }
    
    .brand-title {
      letter-spacing: 6px; 
      font-weight: 900; 
      font-size: 1.1rem; 
      margin: 0; 
      color: white; 
      text-transform: uppercase;
    }

    .brand-tagline { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; margin-top: 5px; }

    .ticket-body { padding: 2.5rem; position: relative; z-index: 1; }
    
    .movie-title { 
      font-size: 2.2rem; 
      font-weight: 900; 
      line-height: 1.1; 
      margin-bottom: 2rem; 
      color: white; 
      text-transform: uppercase;
    }

    .ticket-info { display: flex; justify-content: space-between; margin-bottom: 1.5rem; text-align: left; }
    .info-label { color: #555; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
    .info-val { font-weight: 600; font-size: 0.95rem; }

    /* Perforated Line effect with stable positioning */
    .perforated {
      border-top: 2px dashed #222;
      margin: 2.5rem 0;
      position: relative;
      width: calc(100% + 5rem);
      margin-left: -2.5rem;
    }
    .perforated::before, .perforated::after {
      content: '';
      position: absolute;
      top: -12px;
      width: 24px;
      height: 24px;
      background: var(--bg-dark);
      border-radius: 50%;
    }
    .perforated::before { left: 10px; }
    .perforated::after { right: 10px; }

    .qr-container {
      background: white;
      width: 140px;
      height: 140px;
      margin: 0 auto;
      padding: 10px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #qrcode-canvas { width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>
  <nav></nav>

  <main class="container">
    <div id="content-anchor" class="success-container animate-fade-in">
      <p style="padding: 5rem; color: var(--text-muted)">Generating your digital pass...</p>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script>
    async function initSuccess() {
      const lastBookingId = localStorage.getItem('last_booking_id');
      const pData = localStorage.getItem('paymentData');
      let data = pData ? JSON.parse(pData) : null;

      // 1. Fail-safe: If paymentData is gone, try to fetch from History API
      if (!data && lastBookingId) {
        console.warn("paymentData missing, attempting recovery via History API...");
        try {
          const user = API.getSession();
          if (user) {
            const history = await API.fetch(`/api/booking?action=history&userid=${user.user_id}`);
            const latest = history.bookings.find(b => b.id == lastBookingId);
            if (latest) {
               data = {
                 booking_id: latest.id,
                 movie_name: latest.movie_name,
                 theater_name: "Movie Magic Cinemas", // Fallback text
                 timmings: latest.timmings,
                 show_date: latest.show_date,
                 seats: typeof latest.selected_seats === 'string' ? JSON.parse(latest.selected_seats) : latest.selected_seats,
                 amount: latest.price
               };
            }
          }
        } catch (e) { console.error("Recovery failed:", e); }
      }

      if (!data) {
        UI.safeRender('content-anchor', `
          <div style="padding: 4rem 2rem;">
            <div style="color: #ff4444; margin-bottom: 2rem;">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            </div>
            <h2 style="color: white; font-size: 2rem;">No Active Booking Found</h2>
            <p style="margin: 1.5rem 0; color: var(--text-muted); max-width: 400px; margin-left: auto; margin-right: auto;">We couldn't retrieve your ticket automatically. Please check your dashboard or history for the confirmed digital pass.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
              <button onclick="window.location.href='/history.html'" class="btn-primary">View History</button>
              <button onclick="window.location.href='/'" class="btn-primary" style="background: transparent; border: 1px solid var(--glass);">Back Home</button>
            </div>
          </div>
        `);
        return;
      }

      // 2. Clear and Render Template
      const template = `
        <div style="background: rgba(40, 167, 69, 0.1); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid #28a745;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#28a745" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        
        <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem; font-weight: 800;">Congratulations!</h1>
        <p style="color: var(--text-muted); font-size: 0.95rem;">Payment Verified. Your digital pass is ready below.</p>

        <div id="ticket-element" class="ticket-card">
          <div class="ticket-header">
            <p class="brand-title">🎬 MOVIE MAGIC</p>
            <p class="brand-tagline">Your Ultimate Movie Experience</p>
          </div>
          <div class="ticket-body">
            <h2 class="movie-title">${data.movie_name || "Movie Magic"}</h2>
            
            <div class="ticket-info">
              <div>
                <p class="info-label">Cinema Hall</p>
                <p class="info-val">${data.theater_name || "Movie Magic Cinemas"}</p>
              </div>
              <div style="text-align: right;">
                <p class="info-label">Show Time</p>
                <p class="info-val">${data.timmings || "Schedule Pending"}</p>
              </div>
            </div>

            <div class="ticket-info">
              <div>
                <p class="info-label">Admission Date</p>
                <p class="info-val">${data.show_date ? new Date(data.show_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase() : "DATE PENDING"}</p>
              </div>
              <div style="text-align: right;">
                <p class="info-label">Seats</p>
                <p class="info-val">${(data.seats && data.seats.length > 0) ? data.seats.join(', ') : "Standby"}</p>
              </div>
            </div>

            <div class="perforated"></div>

            <div class="ticket-info" style="margin-bottom: 1.5rem;">
              <div>
                <p class="info-label">Booking Reference</p>
                <p class="info-val" style="color: var(--primary)">#${data.booking_id || "00000"}</p>
              </div>
              <div style="text-align: right;">
                <p class="info-label">Status</p>
                <p class="info-val" style="color: #28a745; font-weight: 800;">CONFIRMED</p>
              </div>
            </div>

            <div class="qr-container">
              <canvas id="qrcode-canvas"></canvas>
            </div>
          </div>
        </div>

        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
          <button onclick="downloadTicket()" class="btn-primary" style="background: transparent; border: 1px solid var(--primary);">Download Pass (PDF)</button>
          <button onclick="window.location.href='/history.html'" class="btn-primary">View History</button>
        </div>
      `;

      UI.safeRender('content-anchor', template);

      // 3. QR Generation
      const canvas = document.getElementById('qrcode-canvas');
      if(canvas) {
        QRCode.toCanvas(canvas, JSON.stringify({id: data.booking_id, seats: data.seats}), { width: 140, margin: 0 });
      }
      
      // 4. Cleanup
      localStorage.removeItem('paymentData');
    }

    function downloadTicket() {
      const element = document.getElementById('ticket-element');
      const opt = {
        margin: 10,
        filename: 'CinemaTicket.pdf',
        html2canvas: { scale: 2, backgroundColor: '#0F0F0F' },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(element).save();
    }

    // Defensive Trigger
    window.addEventListener('load', initSuccess);
  </script>
</body>
</html>
